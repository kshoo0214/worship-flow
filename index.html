const SLIDE_GRID_GAP = 12;
const SLIDE_CAPTION_H = 34;

function getStageMetrics() {
  const dims = SE.getStageDimensions(appSettings);
  return { width: dims.width, height: dims.height, ratio: dims.width / dims.height };
}

/** 송출 해상도 비율 유지, 슬라이드 개수·영역 크기에 맞춰 열 수 계산 */
function layoutSlideGridForBoard(board, slides) {
  if (!board || !slides?.length) return;
  const filmstrip = slideGrid;
  const padX = 32;
  const padY = 30;
  const areaW = Math.max(filmstrip.clientWidth - padX, 200);
  const areaH = Math.max(filmstrip.clientHeight - padY, 160);
  const capH = appSettings.showSlideCaptions ? SLIDE_CAPTION_H : 0;
  const n = slides.length;
  const gap = SLIDE_GRID_GAP;

  let bestCols = 1;
  let bestCellW = 0;
  for (let cols = 1; cols <= n; cols++) {
    const rows = Math.ceil(n / cols);
    const cellW = (areaW - gap * (cols - 1)) / cols;
    if (cellW <= 0) continue;
    const { ratio } = getStageMetrics();
    const thumbH = cellW / ratio;
    const cellH = thumbH + capH;
    const gridH = rows * cellH + gap * (rows - 1);
    const gridW = cols * cellW + gap * (cols - 1);
    if (gridH <= areaH + 1 && gridW <= areaW + 1 && cellW > bestCellW) {
      bestCellW = cellW;
      bestCols = cols;
    }
  }
  if (bestCellW <= 0) {
    const { ratio } = getStageMetrics();
    bestCols = Math.max(1, Math.min(n, Math.round(Math.sqrt((n * areaW) / (areaH * ratio)))));
    bestCellW = (areaW - gap * (bestCols - 1)) / bestCols;
  }

  const zoomPct = appSettings.slidesFilmstripZoom || 100;
  if (zoomPct === 100) {
    board.style.setProperty('--slide-cols', String(bestCols));
    board.classList.remove('has-zoom-layout');
  } else {
    const zoom = zoomPct / 100;
    const cellW = Math.max(72, Math.round(bestCellW * zoom));
    const cols = Math.max(1, Math.min(n, Math.floor((areaW + gap) / (cellW + gap))));
    board.style.setProperty('--slide-cols', String(cols));
    board.style.setProperty('--slide-cell-w', `${cellW}px`);
    board.classList.add('has-zoom-layout');
  }
  board.style.setProperty('--slide-gap', `${gap}px`);
}

function layoutFilmstripGrids(opts = {}) {
  if (!slideGrid.classList.contains('has-slides')) return;
  const boards = slideGrid.querySelectorAll('.slide-grid-board');
  if (!boards.length) return;
  boards.forEach((board) => {
    const section = board.closest('.slide-song-section');
    const title = section?.dataset.songTitle;
    const slides = title ? getSongSlides(title) : currentSlides;
    layoutSlideGridForBoard(board, slides);
  });
  if (opts.skipThumbRefresh) return;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    refreshSlideThumbnails({ relayoutOnly: !!opts.relayoutOnly, force: !!opts.force });
  }));
}

function layoutSlideGrid(opts = {}) {
  layoutFilmstripGrids({ relayoutOnly: !opts.force, ...opts });
}

function getThumbnailBoxWidth(container) {
  if (!container) return 80;
  const strip = container.closest('.strip-thumb');
  if (strip) return Math.max(strip.clientWidth || 0, 64);
  const reflowThumb = container.closest('.reflow-slide-thumb');
  if (reflowThumb) return Math.max(reflowThumb.clientWidth || 0, 120);
  const media = container.closest('.slide-card-media');
  if (media) return Math.max(media.clientWidth || 0, 80);
  return Math.max(container.clientWidth || 0, 80);
}

function resolveThumbnailTarget(container) {
  if (!container) return null;
  if (container.classList?.contains('thumb-inner')) return container;
  return container.querySelector('.thumb-inner') || container;
}

function slideThumbCacheKey(slide) {
  if (!slide?.id) return '';
  const textSig = (slide.layers || [])
    .filter((l) => l.type === 'text')
    .map((l) => `${l.id}:${(l.content || '').length}`)
    .join('|');
  const bgSig = slide.background?.file || slide.background?.color || slide.background?.type || '';
  return `${slide.id}:${textSig}:${bgSig}`;
}

function relayoutThumbInHost(host) {
  if (!host) return;
  const viewport = host.querySelector('.thumb-scaled-viewport, .scaled-stage-viewport');
  const stage = host.querySelector('.thumb-scaled-stage, .scaled-stage');
  if (viewport && stage) layoutScaledStageIn(viewport, stage);
}

function renderSlideThumbnail(slide, container, opts = {}) {
  if (!container || !slide) return;
  const host = resolveThumbnailTarget(container);
  if (!host) return;
  const norm = SE.normalizeSlide(JSON.parse(JSON.stringify(slide)));
  const cacheKey = slideThumbCacheKey(norm);
  if (!opts.force && !opts.relayoutOnly && host.dataset.thumbKey === cacheKey
    && host.querySelector('.thumb-scaled-viewport, .scaled-stage-viewport')) {
    return;
  }
  if (opts.relayoutOnly && host.dataset.thumbKey === cacheKey) {
    relayoutThumbInHost(host);
    return;
  }
  host.classList.remove('is-thumb-ready');
  host.dataset.thumbKey = cacheKey;
  renderScaledStage(host, norm, {
    textMode: 'all',
    viewportClass: 'thumb-scaled-viewport',
    stageClass: 'thumb-scaled-stage',
    render: { clipText: false },
    onLayout: () => host.classList.add('is-thumb-ready'),
  });
}

function escapeAttrValue(value) {
  const s = String(value ?? '');
  return typeof CSS !== 'undefined' && CSS.escape ? CSS.escape(s) : s.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

function findFilmstripCard(songTitle, slideIndex) {
  if (!songTitle || slideIndex < 0) return null;
  return slideGrid.querySelector(
    `.slide-card[data-song-title="${escapeAttrValue(songTitle)}"][data-slide-index="${slideIndex}"]`,
  );
}

function getSongSlides(title) {
  const entry = songLibrary[title];
  if (!entry) return [];
  return (entry.slides || []).map((s) => SE.normalizeSlide(JSON.parse(JSON.stringify(s))));
}

function getPlaylistFilmstripSections() {
  return getActivePlaylistSongs().map((title, songIndex) => ({
    title,
    songIndex,
    slides: getSongSlides(title),
  }));
}

function getSlideCardCaption(slide) {
  if (!appSettings.showSlideCaptions) return '';
  const group = SE.normalizeGroup(slide?.group);
  if (group) return group;
  return (SE.getPrimaryText(slide).split('\n')[0] || '').trim();
}

function refreshSlideThumbnails(opts = {}) {
  slideGrid.querySelectorAll('.slide-card').forEach((card) => {
    const songTitle = card.dataset.songTitle;
    const slideIndex = Number(card.dataset.slideIndex);
    if (!songTitle || Number.isNaN(slideIndex)) return;
    const slide = getSongSlides(songTitle)[slideIndex];
    const thumb = card.querySelector('.thumb-inner') || card.querySelector('.thumb-stage');
    if (thumb && slide) renderSlideThumbnail(slide, thumb, opts);
  });
}

function scheduleSlideThumbnail(slide, container) {
  const draw = () => renderSlideThumbnail(slide, container);
  requestAnimationFrame(() => requestAnimationFrame(draw));
}

function deleteSongFromLibrary(title) {
  const t = String(title || '').trim();
  if (!t || !songLibrary[t]) return;
  if (appSettings.confirmBeforeDelete && !confirm(I18N.t('deleteConfirm'))) return;
  if (currentSongTitle === t) {
    if (appWorkspaceMode !== 'slides') exitEditWorkspace();
    clearCurrentSongSelection();
  }
  ipcRenderer.send('delete-song', { title: t });
}

function renderLibrarySearchResults() {
  const list = document.getElementById('librarySearchResults');
  if (!list) return;
  const titles = Object.keys(songLibrary).sort((a, b) => a.localeCompare(b, 'ko'));
  if (!titles.length) {
    list.innerHTML = `<div class="list-empty">${I18N.t('emptyLibrary')}</div>`;
    return;
  }
  if (!librarySearchQuery) {
    list.innerHTML = `<div class="list-empty">${I18N.t('librarySearchPrompt')}</div>`;
    return;
  }
  const filtered = titles.filter((t) => t.toLowerCase().includes(librarySearchQuery));
  if (!filtered.length) {
    list.innerHTML = `<div class="list-empty">${I18N.t('emptySearch')}</div>`;
    return;
  }
  list.innerHTML = '';
  filtered.forEach((title) => {
    const row = document.createElement('div');
    row.className = 'library-search-row' + (title === currentSongTitle ? ' is-current' : '');
    const item = document.createElement('div');
    item.className = 'library-item';
    item.textContent = title;
    item.title = I18N.t('libraryHint');
    item.draggable = true;
    item.dataset.songTitle = title;
    item.onclick = (ev) => {
      if (ev.shiftKey) {
        if (!getActivePlaylistSongs().includes(title)) addToSetlist(title);
        else renderSetlist();
        return;
      }
      loadSongToSlides(title);
      closeLibrarySearchPopup();
    };
    const btnDel = document.createElement('button');
    btnDel.type = 'button';
    btnDel.className = 'library-search-delete';
    btnDel.textContent = '×';
    btnDel.title = I18N.t('libraryDeleteSong');
    btnDel.setAttribute('aria-label', I18N.t('libraryDeleteSong'));
    btnDel.onclick = (ev) => {
      ev.stopPropagation();
      deleteSongFromLibrary(title);
      renderLibrarySearchResults();
    };
    row.append(item, btnDel);
    list.appendChild(row);
  });
}

function getActivePlaylist() {
  const pl = PlaylistStore.findItem(playlistsState.items, playlistsState.activePlaylistId);
  if (pl && PlaylistStore.isPlaylist(pl)) return pl;
  const firstId = PlaylistStore.firstPlaylistId(playlistsState.items);
  if (firstId) {
    playlistsState.activePlaylistId = firstId;
    return PlaylistStore.findItem(playlistsState.items, firstId);
  }
  return null;
}

function getActivePlaylistSongs() {
  return getActivePlaylist()?.songs || [];
}

function getTreeFocusItem() {
  return PlaylistStore.findItem(playlistsState.items, playlistsState.treeFocusId)
    || getActivePlaylist();
}

function getNewChildParentId() {
  const focus = getTreeFocusItem();
  if (!focus) return null;
  if (PlaylistStore.isFolder(focus)) return focus.id;
  return focus.parentId || null;
}

function ensureAncestorsExpanded(parentId) {
  let pid = parentId;
  while (pid) {
    if (!playlistsState.expandedFolderIds.includes(pid)) {
      playlistsState.expandedFolderIds.push(pid);
    }
    const parent = PlaylistStore.findItem(playlistsState.items, pid);
    pid = parent?.parentId || null;
  }
}

function persistPlaylists() {
  playlistsState = PlaylistStore.normalizePlaylists(playlistsState);
  ipcRenderer.send('playlists:save', playlistsState);
}

function prunePlaylistsForLibrary() {
  let changed = false;
  for (const pl of PlaylistStore.getPlaylistItems(playlistsState.items)) {
    const next = pl.songs.filter((t) => songLibrary[t]);
    if (next.length !== pl.songs.length) {
      pl.songs = next;
      changed = true;
    }
  }
  if (changed) persistPlaylists();
  renderPlaylistTree();
}

function scrollPlaylistTreeIntoView(id) {
  requestAnimationFrame(() => {
    const el = document.getElementById('playlistTree')?.querySelector(`[data-tree-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
}

function buildPlaylistTreeRow(item, depth) {
  const row = document.createElement('div');
  row.className = 'playlist-tree-row';
  row.dataset.treeId = item.id;
  row.style.paddingLeft = `${6 + depth * 14}px`;
  const chevron = document.createElement('span');
  chevron.className = 'playlist-tree-chevron';
  const icon = document.createElement('span');
  icon.className = 'playlist-tree-icon';
  const label = document.createElement('span');
  label.className = 'playlist-tree-label';
  label.textContent = item.name;
  label.title = item.name;
  const meta = document.createElement('span');
  meta.className = 'playlist-tree-meta';

  if (PlaylistStore.isFolder(item)) {
    row.classList.add('is-folder');
    const expanded = playlistsState.expandedFolderIds.includes(item.id);
    chevron.textContent = expanded ? '▼' : '▶';
    icon.textContent = '📁';
    const childPl = PlaylistStore.getChildren(playlistsState.items, item.id)
      .filter(PlaylistStore.isPlaylist).length;
    meta.textContent = childPl ? `${childPl}` : '';
    if (item.id === playlistsState.treeFocusId) row.classList.add('is-focus');
    chevron.onclick = (ev) => {
      ev.stopPropagation();
      toggleFolderExpand(item.id);
    };
    row.onclick = () => {
      playlistsState.treeFocusId = item.id;
      renderPlaylistTree();
    };
  } else {
    row.classList.add('is-playlist');
    chevron.classList.add('is-leaf');
    icon.textContent = '♪';
    meta.textContent = String(item.songs.length);
    if (item.id === playlistsState.activePlaylistId) row.classList.add('is-active-playlist');
    if (item.id === playlistsState.treeFocusId) row.classList.add('is-focus');
    row.onclick = () => switchActivePlaylist(item.id);
  }
  row.append(chevron, icon, label, meta);
  return row;
}

function appendPlaylistTreeNodes(container, parentId, depth) {
  const children = PlaylistStore.getChildren(playlistsState.items, parentId);
  for (const item of children) {
    container.appendChild(buildPlaylistTreeRow(item, depth));
    if (PlaylistStore.isFolder(item) && playlistsState.expandedFolderIds.includes(item.id)) {
      appendPlaylistTreeNodes(container, item.id, depth + 1);
    }
  }
}

function renderPlaylistTree() {
  const el = document.getElementById('playlistTree');
  if (!el) return;
  el.innerHTML = '';
  const roots = PlaylistStore.getChildren(playlistsState.items, null);
  if (!roots.length) {
    el.innerHTML = `<div class="list-empty">${I18N.t('emptyPlaylistTree')}</div>`;
    return;
  }
  appendPlaylistTreeNodes(el, null, 0);
  const delBtn = document.getElementById('btnPlaylistDelete');
  const focus = getTreeFocusItem();
  const playlistCount = PlaylistStore.getPlaylistItems(playlistsState.items).length;
  if (delBtn) {
    if (!focus) delBtn.disabled = true;
    else if (PlaylistStore.isPlaylist(focus)) delBtn.disabled = playlistCount <= 1;
    else delBtn.disabled = false;
  }
}

function toggleFolderExpand(folderId) {
  const i = playlistsState.expandedFolderIds.indexOf(folderId);
  if (i >= 0) playlistsState.expandedFolderIds.splice(i, 1);
  else playlistsState.expandedFolderIds.push(folderId);
  persistPlaylists();
  renderPlaylistTree();
}

function switchActivePlaylist(id) {
  const item = PlaylistStore.findItem(playlistsState.items, id);
  if (!item || !PlaylistStore.isPlaylist(item)) return;
  playlistsState.activePlaylistId = id;
  playlistsState.treeFocusId = id;
  ensureAncestorsExpanded(item.parentId);
  persistPlaylists();
  renderPlaylistTree();
  renderSetlist();
  scrollPlaylistTreeIntoView(id);
}

function openPlaylistModal(mode) {
  const item = getTreeFocusItem();
  const titleEl = document.getElementById('playlistModalTitle');
  const msgEl = document.getElementById('playlistModalMessage');
  const labelEl = document.getElementById('playlistModalLabel');
  const inputEl = document.getElementById('playlistModalInput');
  if (!playlistModal || !titleEl || !inputEl) return false;

  playlistModalMode = mode;
  msgEl.hidden = true;
  inputEl.style.display = '';
  labelEl.style.display = '';

  if (mode === 'folder') {
    titleEl.textContent = I18N.t('playlistFolderNamePrompt');
    labelEl.textContent = I18N.t('playlistFolderNamePrompt');
    inputEl.value = I18N.t('playlistFolderDefaultName');
  } else if (mode === 'playlist') {
    const n = PlaylistStore.getPlaylistItems(playlistsState.items).length + 1;
    titleEl.textContent = I18N.t('playlistNew');
    labelEl.textContent = I18N.t('playlistNamePrompt');
    inputEl.value = I18N.t('playlistDefaultName', { n });
  } else if (mode === 'rename') {
    if (!item) return false;
    const key = PlaylistStore.isFolder(item) ? 'playlistFolderRenamePrompt' : 'playlistRenamePrompt';
    titleEl.textContent = I18N.t(key);
    labelEl.textContent = I18N.t(key);
    inputEl.value = item.name;
  } else if (mode === 'delete') {
    if (!item) return false;
    if (PlaylistStore.isPlaylist(item) && PlaylistStore.getPlaylistItems(playlistsState.items).length <= 1) {
      return false;
    }
    titleEl.textContent = I18N.t('playlistDelete');
    labelEl.style.display = 'none';
    inputEl.style.display = 'none';
    msgEl.hidden = false;
    if (PlaylistStore.isFolder(item)) {
      const childCount = PlaylistStore.collectDescendantIds(playlistsState.items, item.id).length - 1;
      msgEl.textContent = I18N.t('playlistFolderDeleteConfirm', { name: item.name, count: childCount });
    } else {
      msgEl.textContent = I18N.t('playlistDeleteConfirm', { name: item.name });
    }
  } else {
    return false;
  }

  playlistModal.classList.add('is-open');
  if (mode !== 'delete') {
    inputEl.focus();
    inputEl.select();
  } else {
    document.getElementById('btnPlaylistModalConfirm')?.focus();
  }
  return true;
}

function closePlaylistModal() {
  playlistModalMode = null;
  closeModal(playlistModal);
}

function confirmPlaylistModal() {
  const mode = playlistModalMode;
  const inputEl = document.getElementById('playlistModalInput');
  const trimmed = String(inputEl?.value || '').trim();
  closePlaylistModal();

  if (mode === 'folder') {
    if (!trimmed) return;
    const parentId = getNewChildParentId();
    const folder = {
      id: PlaylistStore.folderId(),
      type: PlaylistStore.TYPE_FOLDER,
      name: trimmed,
      parentId,
    };
    playlistsState.items.push(folder);
    ensureAncestorsExpanded(parentId);
    if (!playlistsState.expandedFolderIds.includes(folder.id)) {
      playlistsState.expandedFolderIds.push(folder.id);
    }
    playlistsState.treeFocusId = folder.id;
    persistPlaylists();
    renderPlaylistTree();
    return;
  }

  if (mode === 'playlist') {
    if (!trimmed) return;
    const parentId = getNewChildParentId();
    const pl = {
      id: PlaylistStore.playlistId(),
      type: PlaylistStore.TYPE_PLAYLIST,
      name: trimmed,
      parentId,
      songs: [],
    };
    playlistsState.items.push(pl);
    ensureAncestorsExpanded(parentId);
    switchActivePlaylist(pl.id);
    return;
  }

  if (mode === 'rename') {
    const item = getTreeFocusItem();
    if (!item || !trimmed) return;
    item.name = trimmed;
    persistPlaylists();
    renderPlaylistTree();
    return;
  }

  if (mode === 'delete') {
    applyDeleteTreeFocusItem();
  }
}

function applyDeleteTreeFocusItem() {
  const item = getTreeFocusItem();
  if (!item) return;
  if (PlaylistStore.isFolder(item)) {
    const ids = PlaylistStore.collectDescendantIds(playlistsState.items, item.id);
    playlistsState.items = playlistsState.items.filter((it) => !ids.includes(it.id));
    playlistsState.expandedFolderIds = playlistsState.expandedFolderIds.filter((id) => !ids.includes(id));
  } else {
    if (PlaylistStore.getPlaylistItems(playlistsState.items).length <= 1) return;
    playlistsState.items = playlistsState.items.filter((it) => it.id !== item.id);
  }
  const active = PlaylistStore.findItem(playlistsState.items, playlistsState.activePlaylistId);
  if (!active || !PlaylistStore.isPlaylist(active)) {
    playlistsState.activePlaylistId = PlaylistStore.firstPlaylistId(playlistsState.items);
  }
  playlistsState.treeFocusId = playlistsState.activePlaylistId;
  persistPlaylists();
  renderPlaylistTree();
  renderSetlist();
}

function createNewFolder() {
  openPlaylistModal('folder');
}

function createNewPlaylist() {
  openPlaylistModal('playlist');
}

function renameTreeFocusItem() {
  if (!getTreeFocusItem()) return;
  openPlaylistModal('rename');
}

function deleteTreeFocusItem() {
  if (!openPlaylistModal('delete')) return;
}

function insertSongIntoActivePlaylist(title, index) {
  const pl = getActivePlaylist();
  if (!pl) {
    alert(I18N.t('playlistNeedActive'));
    return;
  }
  if (!title || !songLibrary[title]) return;
  const songs = pl.songs;
  const existing = songs.indexOf(title);
  if (existing >= 0) {
    songs.splice(existing, 1);
    if (existing < index) index -= 1;
  }
  index = Math.max(0, Math.min(index, songs.length));
  songs.splice(index, 0, title);
  persistPlaylists();
  renderPlaylistTree();
  renderSetlist();
}

function moveSongInActivePlaylist(fromIndex, toIndex) {
  const songs = getActivePlaylist()?.songs;
  if (!songs || fromIndex < 0 || fromIndex >= songs.length) return;
  toIndex = Math.max(0, Math.min(toIndex, songs.length));
  const [t] = songs.splice(fromIndex, 1);
  if (fromIndex < toIndex) toIndex -= 1;
  songs.splice(toIndex, 0, t);
  persistPlaylists();
  renderPlaylistTree();
  renderSetlist();
}

function addToSetlist(title) {
  insertSongIntoActivePlaylist(title, getActivePlaylistSongs().length);
  loadSongToSlides(title);
}

function moveSetlistItem(index, delta) {
  moveSongInActivePlaylist(index, index + delta);
}

function removeSetlistItem(index) {
  const pl = getActivePlaylist();
  if (!pl || index < 0 || index >= pl.songs.length) return;
  pl.songs.splice(index, 1);
  persistPlaylists();
  renderPlaylistTree();
  renderSetlist();
}

function getPlaylistDropIndex(container, clientY) {
  const items = [...container.querySelectorAll('.playlist-item')];
  for (let i = 0; i < items.length; i++) {
    const rect = items[i].getBoundingClientRect();
    if (clientY < rect.top + rect.height / 2) return i;
  }
  return items.length;
}

function readSongDragData(e) {
  return {
    title: e.dataTransfer.getData(DND_SONG),
    source: e.dataTransfer.getData(DND_SOURCE),
    index: Number.parseInt(e.dataTransfer.getData(DND_INDEX), 10),
  };
}

function getSongDragPayload(e) {
  if (activeSongDrag?.title) return activeSongDrag;
  const title = e.dataTransfer.getData(DND_SONG);
  if (!title) return null;
  return readSongDragData(e);
}

function beginSongDrag(title, source, index, rowEl, dataTransfer) {
  activeSongDrag = { title, source, index };
  dataTransfer.setData(DND_SONG, title);
  dataTransfer.setData(DND_SOURCE, source);
  dataTransfer.setData('text/plain', title);
  if (!Number.isNaN(index)) dataTransfer.setData(DND_INDEX, String(index));
  dataTransfer.effectAllowed = source === 'library' ? 'copy' : 'move';
  rowEl?.classList.add('is-dragging');
}

function setupSongDragDrop() {
  const searchResults = document.getElementById('librarySearchResults');
  const setlist = document.getElementById('setlist');
  if (!setlist || setlist._sbDnd) return;
  setlist._sbDnd = true;

  function clearDropUi() {
    setlist.classList.remove('is-drop-target');
    setlist.querySelectorAll('.playlist-item.is-drop-before').forEach((el) => el.classList.remove('is-drop-before'));
  }

  if (!document.body._sbSongDragEnd) {
    document.body._sbSongDragEnd = true;
    document.addEventListener('dragend', () => {
      activeSongDrag = null;
      document.querySelectorAll('.library-item.is-dragging, .playlist-item.is-dragging')
        .forEach((el) => el.classList.remove('is-dragging'));
      clearDropUi();
    });
  }

  if (searchResults && !searchResults._sbDnd) {
    searchResults._sbDnd = true;
    searchResults.addEventListener('dragstart', (e) => {
      const row = e.target.closest('.library-item');
      if (!row?.dataset.songTitle) return;
      beginSongDrag(row.dataset.songTitle, 'library', NaN, row, e.dataTransfer);
    });
  }

  setlist.addEventListener('dragenter', (e) => {
    if (!activeSongDrag?.title) return;
    e.preventDefault();
  });

  setlist.addEventListener('dragstart', (e) => {
    if (e.target.closest('button')) {
      e.preventDefault();
      return;
    }
    const row = e.target.closest('.playlist-item');
    if (!row?.dataset.songTitle) return;
    beginSongDrag(
      row.dataset.songTitle,
      'playlist',
      Number.parseInt(row.dataset.songIndex, 10),
      row,
      e.dataTransfer,
    );
  });

  setlist.addEventListener('dragover', (e) => {
    const data = getSongDragPayload(e);
    if (!data?.title) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = data.source === 'library' ? 'copy' : 'move';
    setlist.classList.add('is-drop-target');
    setlist.querySelectorAll('.playlist-item.is-drop-before').forEach((el) => el.classList.remove('is-drop-before'));
    const item = e.target.closest('.playlist-item');
    if (item) item.classList.add('is-drop-before');
  });
  setlist.addEventListener('dragleave', (e) => {
    if (!setlist.contains(e.relatedTarget)) clearDropUi();
  });
  setlist.addEventListener('drop', (e) => {
    const data = getSongDragPayload(e);
    if (!data?.title || !songLibrary[data.title]) return;
    e.preventDefault();
    clearDropUi();
    const toIndex = getPlaylistDropIndex(setlist, e.clientY);
    if (data.source === 'library') {
      insertSongIntoActivePlaylist(data.title, toIndex);
      return;
    }
    if (data.source === 'playlist' && !Number.isNaN(data.index)) {
      moveSongInActivePlaylist(data.index, toIndex);
    }
  });
}

function renderSetlist(opts = {}) {
  const el = document.getElementById('setlist');
  const songs = getActivePlaylistSongs();
  if (!songs.length) {
    el.innerHTML = `<div class="list-empty">${I18N.t('emptyPlaylist')}</div>`;
    if (!opts.skipFilmstrip && appWorkspaceMode === 'slides') renderSlideFilmstrip();
    return;
  }
  el.innerHTML = '';
  const last = songs.length - 1;
  songs.forEach((title, i) => {
    const item = document.createElement('div');
    item.className = 'playlist-item' + (title === currentSongTitle ? ' selected' : '');
    item.draggable = true;
    item.dataset.songTitle = title;
    item.dataset.songIndex = String(i);
    const label = document.createElement('span');
    label.className = 'playlist-item-title';
    label.textContent = `${i + 1}. ${title}`;
    label.title = title;
    label.onclick = () => loadSongToSlides(title);
    const actions = document.createElement('span');
    actions.className = 'playlist-item-actions';
    const btnUp = document.createElement('button');
    btnUp.type = 'button';
    btnUp.className = 'playlist-btn';
    btnUp.textContent = '↑';
    btnUp.title = I18N.t('playlistMoveUp');
    btnUp.disabled = i === 0;
    btnUp.onclick = (ev) => { ev.stopPropagation(); moveSetlistItem(i, -1); };
    const btnDown = document.createElement('button');
    btnDown.type = 'button';
    btnDown.className = 'playlist-btn';
    btnDown.textContent = '↓';
    btnDown.title = I18N.t('playlistMoveDown');
    btnDown.disabled = i === last;
    btnDown.onclick = (ev) => { ev.stopPropagation(); moveSetlistItem(i, 1); };
    const btnRemove = document.createElement('button');
    btnRemove.type = 'button';
    btnRemove.className = 'playlist-btn playlist-btn-remove';
    btnRemove.textContent = '×';
    btnRemove.title = I18N.t('playlistRemove');
    btnRemove.onclick = (ev) => { ev.stopPropagation(); removeSetlistItem(i); };
    actions.append(btnUp, btnDown, btnRemove);
    item.append(label, actions);
    el.appendChild(item);
  });
  if (!opts.skipFilmstrip && appWorkspaceMode === 'slides') renderSlideFilmstrip();
}

function mediaFilenameFromItem(item) {
  if (!item?.src) return '';
  try {
    const p = decodeURIComponent(new URL(item.src).pathname);
    return p.split('/').pop() || '';
  } catch (_) {
    return '';
  }
}

function persistCurrentSongSlides() {
  if (!currentSongTitle) return;
  const lyrics = SE.slidesToLyrics(currentSlides);
  const data = {
    version: 2,
    lyrics,
    slides: currentSlides.map((s) => SE.normalizeSlide(JSON.parse(JSON.stringify(s)))),
  };
  songLibrary[currentSongTitle] = SE.migrateSongEntry(data);
  ipcRenderer.send('save-song', { title: currentSongTitle, originalTitle: currentSongTitle, data });
}

function clearCurrentSongSelection() {
  if (appWorkspaceMode !== 'slides') exitEditWorkspace();
  currentSongTitle = '';
  currentSlides = [];
  activeSlideIndex = -1;
  document.getElementById('currentSongTitle').textContent = I18N.t('selectSong');
  updateWorkspaceHeadState();
  renderLiveUI();
  clearProgramOutput();
  setBroadcastStatus(false, 'statusIdle');
  updateThemeApplyButton();
}

function closeSlideContextMenu() {
  if (slideContextMenuEl) slideContextMenuEl.remove();
  slideContextMenuEl = null;
  slideContextMenuIndex = -1;
}

function ensureFilmstripSongContext(songTitle, slideIndex) {
  if (!songTitle) return false;
  const slides = getSongSlides(songTitle);
  if (slideIndex < 0 || slideIndex >= slides.length) return false;
  if (songTitle !== currentSongTitle) {
    loadSongToSlides(songTitle, { resumeSlideIndex: slideIndex, preserveFilmstrip: true });
  }
  return true;
}

function openSlideContextMenu(clientX, clientY, songTitle, slideIndex) {
  closeSlideContextMenu();
  if (!songTitle || slideIndex < 0 || slideIndex >= getSongSlides(songTitle).length) return;
  slideContextMenuIndex = slideIndex;

  const menu = document.createElement('div');
  menu.className = 'slide-context-menu';
  menu.setAttribute('role', 'menu');

  const addItem = (label, onClick, disabled = false) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = label;
    btn.disabled = disabled;
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      closeSlideContextMenu();
      onClick();
    });
    menu.appendChild(btn);
  };

  addItem(I18N.t('ctxEditSlide'), () => {
    if (!ensureFilmstripSongContext(songTitle, slideIndex)) return;
    selectSlide(slideIndex);
    setNavHighlight('editor');
    enterSlideEditWorkspace({ slideIndex });
  });

  const groupWrap = document.createElement('div');
  groupWrap.className = 'ctx-submenu';
  const groupBtn = document.createElement('button');
  groupBtn.type = 'button';
  groupBtn.textContent = I18N.t('ctxChangeGroup');
  groupWrap.appendChild(groupBtn);
  const flyout = document.createElement('div');
  flyout.className = 'ctx-submenu-flyout';
  SE.LIVE_GROUP_PRESETS.forEach((label) => {
    const gbtn = document.createElement('button');
    gbtn.type = 'button';
    gbtn.textContent = label;
    gbtn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      closeSlideContextMenu();
      const group = label === 'Blank' ? '' : label;
      if (!ensureFilmstripSongContext(songTitle, slideIndex)) return;
      currentSlides[slideIndex].group = group;
      currentSlides[slideIndex] = SE.normalizeSlide(currentSlides[slideIndex]);
      persistCurrentSongSlides();
      renderSlideFilmstrip();
      if (activeSlideIndex === slideIndex) renderPreviewSlide(currentSlides[slideIndex]);
    });
    flyout.appendChild(gbtn);
  });
  groupWrap.appendChild(flyout);
  menu.appendChild(groupWrap);

  const hoverItem = hoveredMediaId ? mediaLibrary.find((m) => m.id === hoveredMediaId) : null;
  addItem(I18N.t('ctxAssignMediaBg'), () => {
    if (!hoverItem) return;
    const file = mediaFilenameFromItem(hoverItem);
    if (!file) return;
    if (!ensureFilmstripSongContext(songTitle, slideIndex)) return;
    currentSlides[slideIndex].background = { type: hoverItem.type === 'video' ? 'video' : 'image', file };
    currentSlides[slideIndex] = SE.normalizeSlide(currentSlides[slideIndex]);
    persistCurrentSongSlides();
    renderSlideFilmstrip();
    if (activeSlideIndex === slideIndex) renderPreviewSlide(currentSlides[slideIndex]);
  }, !hoverItem);

  addItem(I18N.t('ctxClearSlideBg'), () => {
    if (!ensureFilmstripSongContext(songTitle, slideIndex)) return;
    currentSlides[slideIndex].background = { type: 'color', color: '#000000' };
    currentSlides[slideIndex] = SE.normalizeSlide(currentSlides[slideIndex]);
    persistCurrentSongSlides();
    renderSlideFilmstrip();
    if (activeSlideIndex === slideIndex) renderPreviewSlide(currentSlides[slideIndex]);
  });

  const sep = document.createElement('div');
  sep.className = 'ctx-sep';
  menu.appendChild(sep);

  addItem(I18N.t('ctxDupSlide'), () => {
    if (!ensureFilmstripSongContext(songTitle, slideIndex)) return;
    const copy = SE.duplicateSlide(currentSlides[slideIndex]);
    currentSlides.splice(slideIndex + 1, 0, copy);
    persistCurrentSongSlides();
    renderSlideFilmstrip();
    selectSlide(slideIndex + 1);
  });

  addItem(I18N.t('ctxDelSlide'), () => {
    if (!ensureFilmstripSongContext(songTitle, slideIndex)) return;
    if (currentSlides.length <= 1) {
      alert(I18N.t('ctxDelSlideLast'));
      return;
    }
    if (appSettings.confirmBeforeDelete && !confirm(I18N.t('ctxDelSlideConfirm'))) return;
    currentSlides.splice(slideIndex, 1);
    if (activeSlideIndex >= currentSlides.length) activeSlideIndex = currentSlides.length - 1;
    else if (activeSlideIndex > slideIndex) activeSlideIndex -= 1;
    persistCurrentSongSlides();
    renderSlideFilmstrip();
    if (activeSlideIndex >= 0) selectSlide(activeSlideIndex);
    else {
      renderPreviewSlide(null);
      setBroadcastStatus(false, 'statusWaitSlide');
    }
  });

  document.body.appendChild(menu);
  slideContextMenuEl = menu;
  const rect = menu.getBoundingClientRect();
  let left = clientX;
  let top = clientY;
  if (left + rect.width > window.innerWidth - 8) left = window.innerWidth - rect.width - 8;
  if (top + rect.height > window.innerHeight - 8) top = window.innerHeight - rect.height - 8;
  menu.style.left = `${Math.max(8, left)}px`;
  menu.style.top = `${Math.max(8, top)}px`;
}

document.addEventListener('click', () => closeSlideContextMenu());
document.addEventListener('scroll', () => closeSlideContextMenu(), true);
window.addEventListener('blur', () => closeSlideContextMenu());

function loadSongToSlides(title, opts = {}) {
  const entry = songLibrary[title];
  if (!entry) return;
  const sameSong = currentSongTitle === title;
  const inEditor = appWorkspaceMode !== 'slides';
  if (inEditor && sameSong && opts.keepWorkspace) {
    const slides = entry.slides.map((s) => SE.normalizeSlide(JSON.parse(JSON.stringify(s))));
    currentSlides = slides;
    if (appWorkspaceMode === 'slide-edit' || appWorkspaceMode === 'reflow') {
      editorSongData.slides = slides.map((s) => SE.normalizeSlide(JSON.parse(JSON.stringify(s))));
      if (appWorkspaceMode === 'slide-edit') {
        scheduleEditorStripRefresh();
        renderEditorCanvas();
        const layer = selectedLayerId ? getLayerById(selectedLayerId) : null;
        if (layer) {
          renderLayerList(getCurrentSlide());
          syncInspectorTransformInputs(layer);
        } else {
          renderInspector();
        }
      } else {
        renderReflowMiniPreview();
      }
    }
    if (!slideGrid.querySelector('.slide-card')) renderSlideFilmstrip();
    else scheduleFilmstripThumbRefresh();
    return;
  }
  if (inEditor) exitEditWorkspace();
  const resumeIndex = Number.isInteger(opts.resumeSlideIndex)
    ? opts.resumeSlideIndex
    : (opts.preserveSlideIndex && activeSlideIndex >= 0 ? activeSlideIndex : -1);
  currentSongTitle = title;
  document.getElementById('currentSongTitle').textContent = title;
  currentSlides = entry.slides.map((s) => SE.normalizeSlide(JSON.parse(JSON.stringify(s))));
  activeSlideIndex = -1;
  updateWorkspaceHeadState();
  renderLiveUI({ preserveFilmstrip: !!opts.preserveFilmstrip });
  if (librarySearchOpen) renderLibrarySearchResults();
  updateWorkspaceHeadForMode();
  updateThemeApplyButton();
  if (opts.selectFirstSlide && currentSlides.length) {
    selectSlide(0);
    scrollActiveSlideIntoView('auto');
  } else if (resumeIndex >= 0 && resumeIndex < currentSlides.length) {
    selectSlide(resumeIndex);
    scrollActiveSlideIntoView('auto');
  } else {
    setBroadcastStatus(false, isBlackout ? 'statusBlackout' : 'statusWaitSlide');
    if (!isBlackout) clearProgramOutput();
  }
}

function buildSlideCard(songTitle, slide, slideIndex, songIndex) {
  const showGh = !!appSettings.showGroupLabels;
  const caption = getSlideCardCaption(slide);
  const isActive = songTitle === currentSongTitle && slideIndex === activeSlideIndex;
  const card = document.createElement('div');
  card.className = 'slide-card' + (caption ? ' has-caption' : '') + (isActive ? ' active' : '');
  card.setAttribute('role', 'button');
  card.tabIndex = 0;
  card.dataset.songTitle = songTitle;
  card.dataset.slideIndex = String(slideIndex);
  const gs = showGh ? SE.getGroupTagStyle(slide.group) : null;
  const badge = gs?.label
    ? `<span class="group-badge" style="background:${gs.color}">${escapeHtml(gs.label)}</span>`
    : '';
  let inner = `<div class="slide-card-media"><div class="thumb-stage"><div class="thumb-inner"></div></div><span class="slide-index">${slideIndex + 1}</span>${badge}</div>`;
  if (caption) inner += `<div class="slide-caption">${escapeHtml(caption)}</div>`;
  card.innerHTML = inner;
  card.onclick = () => selectPlaylistSlide(songTitle, slideIndex);
  card.ondblclick = (ev) => {
    ev.preventDefault();
    selectPlaylistSlide(songTitle, slideIndex);
    setNavHighlight('editor');
    enterSlideEditWorkspace({ slideIndex });
  };
  card.onkeydown = (ev) => {
    if (ev.key === 'Enter' || ev.key === ' ') {
      ev.preventDefault();
      selectPlaylistSlide(songTitle, slideIndex);
    }
  };
  card.addEventListener('contextmenu', (ev) => {
    ev.preventDefault();
    openSlideContextMenu(ev.clientX, ev.clientY, songTitle, slideIndex);
  });
  return card;
}

function renderSlideFilmstrip() {
  updateSlideCounter();
  const sections = getPlaylistFilmstripSections();
  if (!sections.length) {
    slideGrid.classList.remove('has-slides');
    slideGrid.innerHTML = `<div class="empty-slides">
      <p class="empty-title">${I18N.t('emptySlidesPlaylist')}</p>
      <ol class="empty-steps">
        <li><span class="step-num">1</span><span>${I18N.t('emptyStep1')}</span></li>
        <li><span class="step-num">2</span><span>${I18N.t('emptyStep2')}</span></li>
        <li><span class="step-num">3</span><span>${I18N.t('emptyStep3')}</span></li>
      </ol>
    </div>`;
    return;
  }
  const visibleSections = sections.filter((section) => section.slides.length);
  if (!visibleSections.length) {
    slideGrid.classList.remove('has-slides');
    slideGrid.innerHTML = `<div class="empty-slides"><p class="empty-title">${I18N.t('emptySlidesNoContent')}</p></div>`;
    return;
  }
  slideGrid.classList.add('has-slides');
  const wrap = document.createElement('div');
  wrap.className = 'slide-playlist-strip';
  visibleSections.forEach(({ title, songIndex, slides }) => {
    const section = document.createElement('section');
    section.className = 'slide-song-section' + (title === currentSongTitle ? ' is-current-song' : '');
    section.dataset.songTitle = title;
    const header = document.createElement('div');
    header.className = 'slide-song-header';
    header.textContent = `${songIndex + 1}. ${title}`;
    header.title = title;
    header.addEventListener('click', () => loadSongToSlides(title, { preserveFilmstrip: true }));
    const board = document.createElement('div');
    board.className = 'slide-grid-board';
    slides.forEach((slide, i) => board.appendChild(buildSlideCard(title, slide, i, songIndex)));
    section.append(header, board);
    wrap.appendChild(section);
  });
  slideGrid.innerHTML = '';
  slideGrid.appendChild(wrap);
  requestAnimationFrame(() => {
    layoutFilmstripGrids({ force: true });
    scrollActiveSlideIntoView('auto');
  });
}

function updateSlideFilmstripSelection(prevSong, prevIndex, nextSong, nextIndex) {
  const nextCard = findFilmstripCard(nextSong, nextIndex);
  if (!slideGrid.querySelector('.slide-card') || (nextIndex >= 0 && !nextCard)) {
    renderSlideFilmstrip();
    return;
  }
  updateSlideCounter();
  slideGrid.querySelectorAll('.slide-song-section').forEach((section) => {
    section.classList.toggle('is-current-song', section.dataset.songTitle === nextSong);
  });
  slideGrid.querySelectorAll('.slide-card').forEach((card) => card.classList.remove('active'));
  if (nextCard) {
    nextCard.classList.add('active');
    scrollActiveSlideIntoView('smooth');
  }
}

function highlightFilmstripSelection() {
  slideGrid.querySelectorAll('.slide-song-section').forEach((section) => {
    section.classList.toggle('is-current-song', section.dataset.songTitle === currentSongTitle);
  });
  slideGrid.querySelectorAll('.slide-card').forEach((card) => {
    card.classList.toggle(
      'active',
      card.dataset.songTitle === currentSongTitle
        && Number(card.dataset.slideIndex) === activeSlideIndex,
    );
  });
}

function renderLiveUI(opts = {}) {
  renderPlaylistTree();
  renderSetlist({ skipFilmstrip: true });
  if (!opts.preserveFilmstrip) renderSlideFilmstrip();
  else highlightFilmstripSelection();
}

function updateSlideCounter() {
  const t = currentSlides.length;
  const c = activeSlideIndex >= 0 ? activeSlideIndex + 1 : 0;
  document.getElementById('slideCounter').textContent = I18N.t('slideCount', { current: c, total: t });
  updateSlideNavButtons();
}

/** Stealth cue: queue slide in main (lastSlide) while program stays in blackout. */
function stealthQueueSlide(slide, outSlide) {
  ipcRenderer.send('send-slide', {
    slide: outSlide,
    slideIndex: activeSlideIndex,
    songTitle: currentSongTitle,
    source: 'stealth',
  });
  renderPreviewSlide(slide);
  setBroadcastStatus(false, 'statusBlackout');
  updateWorkspaceHeadForMode();
}

function selectPlaylistSlide(songTitle, slideIndex) {
  if (!songTitle || slideIndex < 0) return;
  const slides = getSongSlides(songTitle);
  if (slideIndex >= slides.length) return;
  if (songTitle !== currentSongTitle) {
    loadSongToSlides(songTitle, { resumeSlideIndex: slideIndex, preserveFilmstrip: true });
    return;
  }
  selectSlide(slideIndex);
}

function selectSlide(index) {
  if (index < 0 || index >= currentSlides.length) return;
  const prevSong = currentSongTitle;
  const prev = activeSlideIndex;
  activeSlideIndex = index;
  updateSlideFilmstripSelection(prevSong, prev, currentSongTitle, index);
  scrollActiveSlideIntoView();
  const slide = SE.normalizeSlide(JSON.parse(JSON.stringify(currentSlides[index])));
  currentSlides[index] = slide;
  renderPreviewSlide(slide);
  const outSlide = slideForOutput(slide);
  if (!SE.hasSlideRenderableContent(outSlide)) {
    if (!isBlackout) ipcRenderer.send('send-slide', null);
    setBroadcastStatus(false, 'statusWaitSlide');
    updateWorkspaceHeadForMode();
    return;
  }
  if (isBlackout) {
    stealthQueueSlide(slide, outSlide);
    return;
  }
  sendBroadcastFullState(slide, { slideIndex: index, source: 'select' });
  setBroadcastStatus(true, 'statusLive');
  updateWorkspaceHeadForMode();
}

function setBlackout(on) {
  isBlackout = on;
  ipcRenderer.send('set-blackout', isBlackout);
  updateBlackoutToggleUI();
  if (isBlackout) {
    setBroadcastStatus(false, 'statusBlackout');
  } else if (activeSlideIndex >= 0) {
    selectSlide(activeSlideIndex);
  } else {
    renderPreviewSlide(null);
    setBroadcastStatus(false, 'statusWaitSlide');
  }
  updateWorkspaceHeadForMode();
}


window.addEventListener('keydown', (e) => {
  if (!appSettings.keyboardShortcuts) return;
  if (isModalOpen(settingsModal)) {
    if (e.key === 'Escape') closeSettings();
    return;
  }
  if (isModalOpen(newSongModal)) {
    if (e.key === 'Escape') closeNewSongModal();
    return;
  }
  if (isModalOpen(playlistModal)) {
    if (e.key === 'Escape') closePlaylistModal();
    return;
  }
  if (handleGlobalShortcut(e)) return;
  if (isEditorOpen()) {
    if (handleEditorShortcut(e)) return;
    return;
  }
  if (isTypingTarget()) return;
  handleLiveShortcut(e);
});

function buildMediaThumbEl(item) {
  const thumb = document.createElement('div');
  thumb.className = 'media-thumb' + (item.id === activeMediaId ? ' active' : '');
  thumb.dataset.mediaId = item.id;
  thumb.title = item.name;

  if (item.type === 'video') {
    const v = document.createElement('video');
    v.src = item.src;
    v.muted = true;
    v.loop = appSettings.loopBackgroundVideo;
    v.playsInline = true;
    v.preload = 'metadata';
    thumb.appendChild(v);
    if (appSettings.mediaHoverPreview) {
      thumb.onmouseenter = () => v.play().catch(() => {});
      thumb.onmouseleave = () => { v.pause(); v.currentTime = 0; };
    }
  } else {
    const img = document.createElement('img');
    img.src = item.src;
    img.alt = item.name;
    img.loading = 'lazy';
    thumb.appendChild(img);
  }

  const label = document.createElement('span');
  label.className = 'media-name';
  label.textContent = item.name;
  thumb.appendChild(label);

  thumb.onmouseenter = () => { hoveredMediaId = item.id; };
  thumb.onmouseleave = () => { if (hoveredMediaId === item.id) hoveredMediaId = null; };
  thumb.onclick = () => applyBackgroundMediaItem(item);
  return thumb;
}

function renderMediaLibrary() {
  if (!mediaLibrary.length) {
    mediaThumbStrip.innerHTML = `<span class="media-empty">${I18N.t('emptyMedia')}</span>`;
    return;
  }
  const existing = new Map(
    [...mediaThumbStrip.querySelectorAll('.media-thumb[data-media-id]')].map((el) => [el.dataset.mediaId, el]),
  );
  const nextIds = new Set(mediaLibrary.map((m) => m.id));
  existing.forEach((el, id) => {
    if (!nextIds.has(id)) el.remove();
  });
  const emptyEl = mediaThumbStrip.querySelector('.media-empty');
  if (emptyEl) emptyEl.remove();

  mediaLibrary.forEach((item) => {
    let thumb = existing.get(item.id);
    if (thumb) {
      thumb.classList.toggle('active', item.id === activeMediaId);
      thumb.title = item.name;
      thumb.querySelector('.media-name').textContent = item.name;
      return;
    }
    thumb = buildMediaThumbEl(item);
    mediaThumbStrip.appendChild(thumb);
  });
}

function initInspectorPointerGuard() {
  if (!inspectorPanel || inspectorPanel.dataset.pointerGuardBound) return;
  inspectorPanel.addEventListener('pointerdown', () => { inspectorPointerDepth += 1; }, true);
  inspectorPanel.addEventListener('pointerup', () => {
    inspectorPointerDepth = Math.max(0, inspectorPointerDepth - 1);
  }, true);
  inspectorPanel.addEventListener('pointercancel', () => {
    inspectorPointerDepth = Math.max(0, inspectorPointerDepth - 1);
  }, true);
  inspectorPanel.dataset.pointerGuardBound = '1';
}

document.getElementById('btnImportMedia').onclick = () => {
  ipcRenderer.send('pick-media-files');
};

mediaFileInput.onchange = () => {
  const files = Array.from(mediaFileInput.files || []);
  files.forEach((file) => {
    if (file.path) ipcRenderer.send('import-media', file.path);
  });
  mediaFileInput.value = '';
};


ipcRenderer.on('background-state', (_e, state) => {
  activeMediaId = state?.id || null;
  const item = mediaLibrary.find((m) => m.id === activeMediaId);
  renderMediaLibrary();
});

ipcRenderer.on('update-media-library', (_e, items) => {
  mediaLibrary = items || [];
  if (activeMediaId && !mediaLibrary.find((m) => m.id === activeMediaId)) {
    activeMediaId = null;
  }
  renderMediaLibrary();
});

window.addEventListener('resize', debounce(() => {
  layoutPreviewStage();
  if (appWorkspaceMode === 'slide-edit' || appWorkspaceMode === 'theme-edit') {
    renderEditorCanvas();
  }
  if (!slideGrid.classList.contains('has-slides')) return;
  layoutSlideGrid();
}, 150));

initAppNavigation();

initPanelResize();

updateMacroBarUI();

  playlistsState = PlaylistStore.normalizePlaylists(state);
  if (!appSettings.autoLoadLastPlaylist) {
    playlistsState.activePlaylistId = '';

document.getElementById('btnPlaylistNewFolder')?.addEventListener('click', () => createNewFolder());
document.getElementById('btnPlaylistNew')?.addEventListener('click', () => createNewPlaylist());

document.getElementById('btnPlaylistDelete')?.addEventListener('click', () => deleteTreeFocusItem());

document.getElementById('btnPlaylistModalConfirm')?.addEventListener('click', () => confirmPlaylistModal());
playlistModal?.addEventListener('click', (e) => {
  if (e.target === playlistModal) closePlaylistModal();
});
document.getElementById('playlistModalInput')?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); confirmPlaylistModal(); }
  if (e.key === 'Escape') { e.preventDefault(); closePlaylistModal(); }
});

setupSongDragDrop();

ipcRenderer.send('request-library');
ipcRenderer.send('request-playlists');
ipcRenderer.send('request-themes');
ipcRenderer.send('request-media-library');
</script>
