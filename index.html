            ...slide.background,
            type: 'color',
            color: document.getElementById('inspBgColor').value,
            opacity: Number(bgOp.value),
          });
          previewEditorChange();
        };
      }
      const bgNameEl = document.getElementById('inspBgFileName');
      if (bgNameEl) {
        if (bg.type === 'image' && bg.file) bgNameEl.textContent = bg.file;
        else if (bg.type === 'image' && bg.src) bgNameEl.textContent = '(저장 시 assets로 이전됩니다)';
        else bgNameEl.textContent = '';
      }
      toggleBgRows();
      bgTypeEl.onchange = () => {
        const t = bgTypeEl.value;
        slide.background = t === 'image'
          ? { type: 'image', file: slide.background?.file || '' }
          : { type: 'color', color: document.getElementById('inspBgColor').value, opacity: Number(document.getElementById('inspBgOpacity')?.value || 1) };
        toggleBgRows();
        commitEditorChange(false);
      };
      const bgColorEl = document.getElementById('inspBgColor');
      if (bgColorEl) {
        bgColorEl.oninput = (e) => {
          slide.background = {
            type: 'color',
            color: e.target.value,
            opacity: Number(document.getElementById('inspBgOpacity')?.value || 1),
          };
          previewEditorChange();
        };
      }
      document.getElementById('btnPickSlideBg')?.addEventListener('click', () => {
        ipcRenderer.send('pick-slide-background', { slideId: slide.id });
      });
    }
  }

  if (layer) {
    fillInspectorTransformInputs(layer);
    bindLayerTransform(layer);
  }
  if (layer?.type === 'text') bindTextInspector(layer);
  if (layer?.type === 'rect') bindRectInspector(layer);
  if (layer) bindInspectorZOrder();
  document.getElementById('btnDeleteLayer')?.addEventListener('click', () => {
    slide.layers = slide.layers.filter((l) => l.id !== selectedLayerId);
    selectedLayerId = null;
    commitEditorChange();
  });
  document.getElementById('btnSaveTheme')?.addEventListener('click', () => saveThemeFromEditor());
}

function getPrimaryTextLayerFromEditor() {
  const slide = getCurrentSlide();
  if (!slide) return null;
  if (selectedLayerId) {
    const layer = getLayerById(selectedLayerId);
    if (layer?.type === 'text') return layer;
  }
  return SE.getPrimaryTextLayer(slide);
}

function saveThemeFromEditor() {
  const slide = getCurrentSlide();
  if (!slide || !SE.getPrimaryTextLayer(slide)) {
    alert(I18N.t('themeNeedText'));
    return;
  }
  const name = String(document.getElementById('themeSaveNameInput')?.value || '').trim();
  if (!name) {
    alert(I18N.t('themeNamePrompt'));
    document.getElementById('themeSaveNameInput')?.focus();
    return;
  }
  themeSaveNotifyUser = true;
  ipcRenderer.send('theme:save', {
    name,
    slide: SE.normalizeSlide(JSON.parse(JSON.stringify(slide))),
  });
}

function setNavHighlight(action) {
  document.querySelectorAll('.nav-btn[data-action]').forEach((btn) => {
    btn.classList.toggle('is-active', btn.dataset.action === action);
  });
}

function focusMainWorkspace() {
  if (appWorkspaceMode === 'slides') {
    setNavHighlight('slides');
    if (isModalOpen(settingsModal)) closeSettings();
    return;
  }
  if (appWorkspaceMode === 'theme-edit') exitThemeEditWorkspace();
  else exitEditWorkspace();
  setNavHighlight('slides');
  if (isModalOpen(settingsModal)) closeSettings();
}

function navHighlightForMode() {
  if (appWorkspaceMode === 'slide-edit') return 'editor';
  if (appWorkspaceMode === 'theme-edit') return 'theme';
  if (appWorkspaceMode === 'reflow') return 'reflow';
  return 'slides';
}

function handleNavAction(action) {
  switch (action) {
    case 'slides':
      focusMainWorkspace();
      return;
    case 'editor':
      setNavHighlight('editor');
      if (appWorkspaceMode === 'slide-edit') return;
      if (!enterSlideEditWorkspace()) setNavHighlight('slides');
      return;
    case 'reflow':
      setNavHighlight('reflow');
      if (appWorkspaceMode === 'reflow') return;
      if (!enterReflowWorkspace()) setNavHighlight('slides');
      return;
    case 'theme':
      if (appWorkspaceMode === 'theme-edit') return;
      enterThemeEditWorkspace({ force: true });
      return;
    default:
      break;
  }
}

function positionLibrarySearchPopup() {
  const input = document.getElementById('librarySearch');
  const popup = document.getElementById('librarySearchPopup');
  if (!input || !popup) return;
  const r = input.getBoundingClientRect();
  popup.style.left = `${Math.round(r.left)}px`;
  popup.style.top = `${Math.round(r.bottom + 4)}px`;
  popup.style.width = `${Math.max(Math.round(r.width), 300)}px`;
}

function setLibrarySearchOpen(open) {
  librarySearchOpen = open;
  const popup = document.getElementById('librarySearchPopup');
  if (!popup) return;
  popup.classList.toggle('is-hidden', !open);
  if (open) {
    positionLibrarySearchPopup();
    renderLibrarySearchResults();
  }
}

function closeLibrarySearchPopup() {
  setLibrarySearchOpen(false);
}

function initLibrarySearch() {
  const searchInput = document.getElementById('librarySearch');
  if (!searchInput) return;
  searchInput.addEventListener('input', onLibrarySearchInput);
  searchInput.addEventListener('focus', () => {
    if (librarySearchQuery) setLibrarySearchOpen(true);
  });
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeLibrarySearchPopup();
      searchInput.blur();
    }
  });
  document.addEventListener('mousedown', (e) => {
    if (!librarySearchOpen || activeSongDrag) return;
    const wrap = document.getElementById('librarySearchWrap');
    const popup = document.getElementById('librarySearchPopup');
    const sidebar = document.querySelector('.sidebar');
    if (wrap?.contains(e.target) || popup?.contains(e.target) || sidebar?.contains(e.target)) return;
    closeLibrarySearchPopup();
  });
  window.addEventListener('resize', () => {
    if (librarySearchOpen) positionLibrarySearchPopup();
  });
}

function initAppNavigation() {
  document.querySelectorAll('.nav-btn[data-action]').forEach((btn) => {
    btn.addEventListener('click', () => handleNavAction(btn.dataset.action));
  });
  initLibrarySearch();
  document.getElementById('btnGoLive')?.addEventListener('click', () => triggerGoLive());
  document.getElementById('btnSlidePrev')?.addEventListener('click', () => {
    if (activeSlideIndex > 0) selectSlide(activeSlideIndex - 1);
    else if (appSettings.slideAdvanceWrap && currentSlides.length) selectSlide(currentSlides.length - 1);
  });
  document.getElementById('btnSlideNext')?.addEventListener('click', () => advanceLiveNextSlide());
}

function updateThemeWorkspaceChrome() {
  const railHead = document.querySelector('.pp-edit-rail-head');
  if (railHead) {
    railHead.textContent = appWorkspaceMode === 'theme-edit'
      ? I18N.t('themeManagerTitle')
      : I18N.t('slideEditRail');
  }
  const saveBtn = document.getElementById('btnSaveSlideEdit');
  const discardBtn = document.getElementById('btnDiscardSlideEdit');
  if (saveBtn) saveBtn.textContent = appWorkspaceMode === 'theme-edit' ? I18N.t('themeSaveBtn') : I18N.t('btnSave');
  if (discardBtn) discardBtn.textContent = I18N.t('btnCancel');
  const addSlideBtn = document.getElementById('btnAddSlideEdit');
  if (addSlideBtn) addSlideBtn.style.display = appWorkspaceMode === 'theme-edit' ? 'none' : '';
}

function updateThemeWorkspaceMeta() {
  const meta = document.getElementById('slideEditMeta');
  if (!meta || appWorkspaceMode !== 'theme-edit') return;
  meta.textContent = themeEditDirty ? I18N.t('themeUnsaved') : I18N.t('themeSavedHint');
}

function loadThemeDraft(theme) {
  themeDraftSlide = Themes.createDraftSlideFromTheme(theme, I18N.getLanguage());
  selectedLayerId = SE.getPrimaryTextLayer(themeDraftSlide)?.id || null;
}

function renderThemeListRail() {
  if (appWorkspaceMode !== 'theme-edit') return;
  const strip = document.getElementById('slideEditStrip');
  if (!strip) return;
  strip.innerHTML = '';
  if (!themeCatalog.length) {
    const empty = document.createElement('div');
    empty.className = 'theme-rail-item';
    empty.style.color = 'var(--muted)';
    empty.textContent = I18N.t('themeManagerNoThemes');
    strip.appendChild(empty);
  } else {
    themeCatalog.forEach((t) => {
      const row = document.createElement('div');
      row.className = 'theme-rail-item' + (t.id === themeEditId ? ' active' : '');
      row.setAttribute('role', 'button');
      row.tabIndex = 0;
      row.textContent = t.name;
      row.onclick = () => selectThemeForEdit(t.id);
      row.onkeydown = (ev) => {
        if (ev.key === 'Enter' || ev.key === ' ') {
          ev.preventDefault();
          selectThemeForEdit(t.id);
        }
      };
      strip.appendChild(row);
    });
  }
  const newBtn = document.createElement('button');
  newBtn.type = 'button';
  newBtn.className = 'secondary theme-rail-new';
  newBtn.textContent = I18N.t('themeNew');
  newBtn.onclick = () => createNewThemeDraft();
  strip.appendChild(newBtn);
}

function selectThemeForEdit(id) {
  const t = themeCatalog.find((x) => x.id === id);
  if (!t) return;
  if (themeEditDirty && !confirm(I18N.t('themeDiscardConfirm'))) return;
  themeEditId = t.id;
  themeEditName = t.name;
  themeEditDirty = false;
  loadThemeDraft(t);
  renderThemeListRail();
  renderEditorCanvas();
  renderInspector();
  updateThemeWorkspaceMeta();
  updateWorkspaceHeadForMode();
}

function createNewThemeDraft() {
  if (themeEditDirty && !confirm(I18N.t('themeDiscardConfirm'))) return;
  themeEditId = `draft_${Date.now()}`;
  themeEditName = I18N.t('themeNewDefaultName');
  themeEditDirty = true;
  loadThemeDraft(null);
  renderThemeListRail();
  renderEditorCanvas();
  renderInspector();
  updateThemeWorkspaceMeta();
  updateWorkspaceHeadForMode();
}

function enterThemeEditWorkspace(opts = {}) {
  if (themeEditDirty && !opts.force && !confirm(I18N.t('themeDiscardConfirm'))) return false;
  if (opts.themeId) {
    const t = themeCatalog.find((x) => x.id === opts.themeId);
    if (t) {
      themeEditId = t.id;
      themeEditName = t.name;
      themeEditDirty = false;
      loadThemeDraft(t);
    } else {
      createNewThemeDraft();
    }
  } else if (!themeDraftSlide) {
    if (themeCatalog.length) selectThemeForEdit(themeCatalog[0].id);
    else createNewThemeDraft();
  }
  selectedLayerId = SE.getPrimaryTextLayer(themeDraftSlide)?.id || null;
  setWorkspaceMode('theme-edit');
  setNavHighlight('theme');
  return true;
}

function exitThemeEditWorkspace() {
  themeEditId = null;
  themeEditName = '';
  themeEditDirty = false;
  themeDraftSlide = null;
  selectedLayerId = null;
  dragState = null;
  pointerPending = null;
  setWorkspaceMode('slides');
  setNavHighlight('slides');
  updateThemeWorkspaceChrome();
}

function saveThemeFromWorkspace() {
  if (!themeDraftSlide) return;
  const nameInput = document.getElementById('inspThemeName');
  const name = String(nameInput?.value || themeEditName || '').trim();
  if (!name) {
    alert(I18N.t('themeNamePrompt'));
    return;
  }
  const payload = {
    id: themeEditId && !String(themeEditId).startsWith('draft_') ? themeEditId : undefined,
    name,
    slide: SE.normalizeSlide(JSON.parse(JSON.stringify(themeDraftSlide))),
  };
  ipcRenderer.send('theme:save', payload);
  themeEditName = name;
  themeEditDirty = false;
  updateThemeWorkspaceMeta();
}

function deleteThemeFromWorkspace() {
  if (!themeEditId || String(themeEditId).startsWith('draft_')) return;
  if (!confirm(I18N.t('themeDeleteConfirm'))) return;
  ipcRenderer.send('theme:delete', { id: themeEditId });
  themeEditId = null;
  themeEditDirty = false;
  themeDraftSlide = null;
}

function openThemeManager() {
  enterThemeEditWorkspace({ force: true });
}

function getEditorPayload() {
  if (editorContext.singleSlide && editorContext.fullSong) {
    const merged = JSON.parse(JSON.stringify(editorContext.fullSong));
    const edited = SE.normalizeSlide(JSON.parse(JSON.stringify(editorSongData.slides[0])));
    merged.slides[editorContext.slideIndex] = edited;
    merged.lyrics = SE.slidesToLyrics(merged.slides);
    return merged;
  }
  syncLyricsFromSlides();
  return {
    version: 2,
    lyrics: editorSongData.lyrics,
    slides: editorSongData.slides.map((s) => SE.normalizeSlide(JSON.parse(JSON.stringify(s)))),
  };
}

function slideForOutput(slide) {
  if (!slide) return slide;
  const s = SE.normalizeSlide(JSON.parse(JSON.stringify(slide)));
  let layers = s.layers || [];
  if (!layerVisibility.lyrics) layers = layers.filter((l) => l.type !== 'text');
  if (!layerVisibility.design) layers = layers.filter((l) => l.type !== 'rect');
  s.layers = layers;
  return s;
}

function updateMacroBarUI() {
  const map = [
    ['macroClearText', 'lyrics'],
    ['macroClearMedia', 'media'],
  ];
  map.forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (!el) return;
    const on = layerVisibility[key];
    el.classList.toggle('on', on);
    el.classList.toggle('off', !on);
    const stateEl = el.querySelector('.macro-state');
    if (stateEl) stateEl.textContent = on ? I18N.t('macroOn') : I18N.t('macroOff');
  });
  const logoEl = document.getElementById('macroLogo');
  if (logoEl) {
    logoEl.classList.toggle('on', logoVisible);
    logoEl.classList.toggle('off', !logoVisible);
    const stateEl = logoEl.querySelector('.macro-state');
    if (stateEl) stateEl.textContent = logoVisible ? I18N.t('macroOn') : I18N.t('macroOff');
  }
  const bo = document.getElementById('macroBlackout');
  if (bo) {
    bo.classList.toggle('on', isBlackout);
    bo.classList.toggle('off', !isBlackout);
    bo.textContent = isBlackout ? I18N.t('blackoutOff') : I18N.t('blackout');
  }
  preview?.classList.toggle('is-blackout-preview', isBlackout);
}

function macroClearTextLayer() {
  layerVisibility.lyrics = !layerVisibility.lyrics;
  updateMacroBarUI();
  syncLayerOutput();
}

function macroClearBackgroundLayer() {
  layerVisibility.media = !layerVisibility.media;
  updateMacroBarUI();
  syncLayerOutput();
}

function updateLayerToggleUI() {
  updateMacroBarUI();
}

function updateBlackoutToggleUI() {
  updateMacroBarUI();
}

function syncLayerOutput() {
  if (isBlackout) return;
  if (!layerVisibility.media) {
    ipcRenderer.send('macro-clear-media');
  } else if (activeMediaId) {
    const item = mediaLibrary.find((m) => m.id === activeMediaId);
    if (item) ipcRenderer.send('background-set', item.id);
  }
  if (activeSlideIndex >= 0 && activeSlideIndex < currentSlides.length) {
    sendBroadcastFullState(currentSlides[activeSlideIndex], { source: 'macro-sync' });
  } else if (!layerVisibility.lyrics) {
    ipcRenderer.send('send-slide', null);
    renderPreviewSlide(null);
  }
}

function toggleLayerVisibility(key) {
  layerVisibility[key] = !layerVisibility[key];
  updateLayerToggleUI();
  syncLayerOutput();
}

function toggleLogo() {
  logoVisible = !logoVisible;
  updateMacroBarUI();
  ipcRenderer.send('logo:toggle', logoVisible);
}

ipcRenderer.on('themes:sync', (_e, themes) => {
  themeCatalog = Array.isArray(themes) ? themes : [];
  renderThemeSelect();
  if (appWorkspaceMode === 'theme-edit') {
    renderThemeListRail();
    if (themeEditId && !String(themeEditId).startsWith('draft_')) {
      const still = themeCatalog.find((t) => t.id === themeEditId);
      if (still && !themeEditDirty) {
        themeEditName = still.name;
        loadThemeDraft(still);
        renderEditorCanvas();
        renderInspector();
      }
    } else if (!themeEditId && themeCatalog.length) {
      selectThemeForEdit(themeCatalog[0].id);
    } else if (!themeCatalog.length && !themeDraftSlide) {
      createNewThemeDraft();
    }
  }
});

ipcRenderer.on('theme:enter-workspace', () => enterThemeEditWorkspace({ force: true }));

ipcRenderer.on('theme:saved', (_e, data) => {
  if (data?.id) themeEditId = data.id;
  themeEditDirty = false;
  updateThemeWorkspaceMeta();
  renderThemeListRail();
  renderThemeSelect();
  if (themeSaveNotifyUser) {
    themeSaveNotifyUser = false;
    alert(I18N.t('themeSaved'));
    const nameInput = document.getElementById('themeSaveNameInput');
    if (nameInput) nameInput.value = '';
  }
});

function syncEditorSongAfterThemeApply(entry) {
  if (appWorkspaceMode !== 'slide-edit' && appWorkspaceMode !== 'reflow') return;
  editorSongData = {
    lyrics: entry.lyrics || '',
    slides: entry.slides.map((s) => SE.normalizeSlide(JSON.parse(JSON.stringify(s)))),
  };
  if (appWorkspaceMode === 'slide-edit') {
    scheduleEditorStripRefresh();
    renderEditorCanvas();
    const layer = selectedLayerId ? getLayerById(selectedLayerId) : null;
    if (layer) syncInspectorTransformInputs(layer);
    else renderInspector();
  }
}

function refreshSlidesAfterThemeApply(slideIdx) {
  renderSlideFilmstrip();
  requestAnimationFrame(() => refreshSlideThumbnails());
  updateWorkspaceHeadState();
  if (slideIdx < 0 || slideIdx >= currentSlides.length) {
    renderPreviewSlide(null);
    setBroadcastStatus(false, 'statusWaitSlide');
    return;
  }
  if (appWorkspaceMode === 'slides') {
    selectSlide(slideIdx);
    return;
  }
  activeSlideIndex = slideIdx;
  updateSlideFilmstripSelection(null, -1, currentSongTitle, slideIdx);
  scrollActiveSlideIntoView();
  const slide = currentSlides[slideIdx];
  if (isBlackout) {
    stealthQueueSlide(slide, slideForOutput(slide));
  } else {
    renderPreviewSlide(slide);
    sendBroadcastFullState(slide, { slideIndex: slideIdx, source: 'theme-apply' });
    setBroadcastStatus(true, 'statusLive');
  }
}

ipcRenderer.on('theme:applied', (_e, data) => {
  if (!data?.title || data.title !== currentSongTitle) return;
  skipLibraryReloadOnce = true;
  const entry = SE.migrateSongEntry(data.song);
  songLibrary[data.title] = entry;
  currentSlides = entry.slides.map((s) => SE.normalizeSlide(JSON.parse(JSON.stringify(s))));
  syncEditorSongAfterThemeApply(entry);
  const slideIdx = Number.isFinite(data.liveSlideIndex) && data.liveSlideIndex >= 0
    ? data.liveSlideIndex
    : activeSlideIndex;
  refreshSlidesAfterThemeApply(slideIdx);
});

function renderThemeSelect() {
  const sel = document.getElementById('themeSelect');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = `<option value="">${I18N.t('themeNone')}</option>`;
  themeCatalog.forEach((t) => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });
  if (prev && themeCatalog.some((t) => t.id === prev)) sel.value = prev;
  sel.disabled = !currentSongTitle;
}

function updateThemeApplyButton() {
  const sel = document.getElementById('themeSelect');
  if (sel) sel.disabled = !currentSongTitle;
}

function applyThemeToCurrentSong(themeId) {
  if (!currentSongTitle) return;
  const id = themeId || document.getElementById('themeSelect')?.value;
  if (!id) return;
  ipcRenderer.send('theme:apply-song', {
    title: currentSongTitle,
    themeId: id,
    liveSlideIndex: activeSlideIndex,
  });
}

document.getElementById('themeSelect')?.addEventListener('change', (e) => {
  if (!e.target.value || !currentSongTitle) return;
  applyThemeToCurrentSong(e.target.value);
});

function toggleBgRows() {
  const t = document.getElementById('inspBgType')?.value;
  document.getElementById('rowBgColor').style.display = t === 'color' ? '' : 'none';
  document.getElementById('rowBgFile').style.display = t === 'image' ? '' : 'none';
}

function toggleShapeInspectorRows() {
  const fillType = document.getElementById('inspFillType')?.value || 'solid';
  const shape = document.getElementById('inspShapeKind')?.value || 'rect';
  const gradOn = fillType === 'gradient';
  const rowEnd = document.getElementById('rowGradientEnd');
  const rowAngle = document.getElementById('rowGradientAngle');
  const rowRadius = document.getElementById('rowShapeRadius');
  if (rowEnd) rowEnd.style.display = gradOn ? '' : 'none';
  if (rowAngle) rowAngle.style.display = gradOn ? '' : 'none';
  if (rowRadius) rowRadius.style.display = shape === 'rect' ? '' : 'none';
}

ipcRenderer.on('slide-background-imported', (_e, data) => {
  if (!data?.file) return;
  const slide = getCurrentSlide();
  if (!slide) return;
  slide.background = { type: 'image', file: data.file };
  renderEditorCanvas();
  renderSlideStrip();
  renderInspector();
});

function bindTextInspector(layer) {
  const st = layer.style;
  const set = (fn) => {
    fn();
    previewEditorChange({ syncLyrics: true });
  };
  const contentEl = document.getElementById('inspTextContent');
  if (contentEl) {
    contentEl.value = layer.content || '';
    contentEl.oninput = (e) => set(() => { layer.content = e.target.value; });
  }
  const fontFamily = document.getElementById('inspFontFamily');
  if (fontFamily) {
    fontFamily.value = st.fontFamily;
    fontFamily.onchange = (e) => set(() => { st.fontFamily = e.target.value; });
  }
  const fontSize = document.getElementById('inspFontSize');
  if (fontSize) {
    fontSize.value = st.fontSize;
    fontSize.oninput = (e) => set(() => { st.fontSize = Number(e.target.value); });
  }
  const fw = document.getElementById('inspFontWeight');
  if (fw) { fw.value = st.fontWeight || '700'; fw.onchange = (e) => set(() => { st.fontWeight = e.target.value; }); }
  const fs = document.getElementById('inspFontStyle');
  if (fs) { fs.value = st.fontStyle || 'normal'; fs.onchange = (e) => set(() => { st.fontStyle = e.target.value; }); }
  const td = document.getElementById('inspTextDecoration');
  if (td) { td.value = st.textDecoration || 'none'; td.onchange = (e) => set(() => { st.textDecoration = e.target.value; }); }
  const lh = document.getElementById('inspLineHeight');
  if (lh) { lh.value = st.lineHeight ?? 1; lh.oninput = (e) => set(() => { st.lineHeight = Number(e.target.value); }); }
  const ls = document.getElementById('inspLetterSpacing');
  if (ls) { ls.value = st.letterSpacing ?? 1; ls.oninput = (e) => set(() => { st.letterSpacing = Number(e.target.value); }); }
  const textOpacity = document.getElementById('inspTextOpacity');
  if (textOpacity) { textOpacity.value = st.opacity ?? 1; textOpacity.oninput = (e) => set(() => { st.opacity = Number(e.target.value); }); }
  const textColor = document.getElementById('inspTextColor');
  if (textColor) {
    textColor.value = st.color;
    textColor.oninput = (e) => set(() => { st.color = e.target.value; });
  }
  document.querySelectorAll('.align-btns button[data-align]').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.align === st.textAlign);
    btn.onclick = () => set(() => {
      st.textAlign = btn.dataset.align;
      document.querySelectorAll('.align-btns button[data-align]').forEach((b) => b.classList.toggle('active', b === btn));
    });
  });
  document.querySelectorAll('#inspVAlignBtns button').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.valign === (st.verticalAlign || 'middle'));
    btn.onclick = () => set(() => {
      st.verticalAlign = btn.dataset.valign;
      document.querySelectorAll('#inspVAlignBtns button').forEach((b) => b.classList.toggle('active', b === btn));
    });
  });
  const strokeOn = document.getElementById('inspStrokeOn');
  if (strokeOn) {
    strokeOn.checked = st.strokeEnabled === true;
    strokeOn.onchange = () => set(() => {
      st.strokeEnabled = strokeOn.checked;
      if (st.strokeEnabled && st.strokeWidth <= 0) st.strokeWidth = 2;
      toggleTextEffectRows();
    });
  }
  const shadowOn = document.getElementById('inspShadowOn');
  if (shadowOn) {
    shadowOn.checked = st.shadowEnabled === true;
    shadowOn.onchange = () => set(() => {
      st.shadowEnabled = shadowOn.checked;
      if (st.shadowEnabled && st.shadowBlur <= 0) st.shadowBlur = 14;
      toggleTextEffectRows();
    });
  }
  const strokeW = document.getElementById('inspStrokeW');
  if (strokeW) {
    strokeW.value = st.strokeWidth;
    strokeW.oninput = (e) => set(() => { st.strokeWidth = Number(e.target.value); });

function bindRectInspector(layer) {
  layer.style = SE.normalizeShapeStyle(layer.style);
  layer.labelStyle = SE.normalizeShapeLabelStyle(layer.labelStyle);
  const st = layer.style;
  const ls = layer.labelStyle;
  const set = (fn, fullRender = false) => {
    fn();
    refreshShapeLayerOnCanvas(layer);
    previewEditorChange({
      light: true,
      broadcast: fullRender,
      history: false,
      save: true,
    });
  };
  const shapeContent = document.getElementById('inspShapeContent');
  if (shapeContent) {
    shapeContent.value = layer.content || '';
    shapeContent.oninput = (e) => set(() => { layer.content = e.target.value; }, true);
  }
  const shapeTextColor = document.getElementById('inspShapeTextColor');
  if (shapeTextColor) {
    shapeTextColor.value = ls.color || '#ffffff';
    shapeTextColor.oninput = (e) => set(() => { ls.color = e.target.value; }, true);
  }
  const shapeFontSize = document.getElementById('inspShapeFontSize');
  if (shapeFontSize) {
    shapeFontSize.value = ls.fontSize ?? 3.5;
    shapeFontSize.oninput = (e) => set(() => { ls.fontSize = Number(e.target.value); }, true);
  }
  const labelWeight = document.getElementById('inspShapeLabelWeight');
  if (labelWeight) {
    labelWeight.value = ls.fontWeight || '700';
    labelWeight.onchange = (e) => set(() => { ls.fontWeight = e.target.value; }, true);
  }
  document.querySelectorAll('#inspShapeLabelAlignBtns button').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.align === (ls.textAlign || 'center'));
    btn.onclick = () => set(() => {
      ls.textAlign = btn.dataset.align;
      document.querySelectorAll('#inspShapeLabelAlignBtns button').forEach((b) => b.classList.toggle('active', b === btn));
    }, true);
  });
  const kindSel = document.getElementById('inspShapeKind');
  if (kindSel) {
    kindSel.value = st.shape || 'rect';
    kindSel.onchange = () => {
      set(() => { st.shape = kindSel.value; }, true);
      toggleShapeInspectorRows();
    };
  }
  const fillTypeEl = document.getElementById('inspFillType');
  if (fillTypeEl) {
    fillTypeEl.value = st.fillType === 'gradient' ? 'gradient' : 'solid';
    fillTypeEl.onchange = () => {
      set(() => { st.fillType = fillTypeEl.value; });
      toggleShapeInspectorRows();
    };
  }
  const fillEl = document.getElementById('inspRectFill');
  const gradEndEl = document.getElementById('inspGradientEnd');
  const gradAngleEl = document.getElementById('inspGradientAngle');
  const opacityEl = document.getElementById('inspRectOpacity');
  const strokeEl = document.getElementById('inspRectStroke');
  const strokeWEl = document.getElementById('inspRectStrokeW');
  if (fillEl) {
    fillEl.value = rgbaToHex(st.fill) || '#5b8def';
    fillEl.oninput = (e) => set(() => { st.fill = e.target.value; });
  }
  if (gradEndEl) {
    gradEndEl.value = rgbaToHex(st.fillGradientEnd) || '#3d6ec9';
    gradEndEl.oninput = (e) => set(() => { st.fillGradientEnd = e.target.value; });
  }
  if (gradAngleEl) {
    gradAngleEl.value = st.gradientAngle ?? 135;
    gradAngleEl.oninput = (e) => set(() => { st.gradientAngle = Number(e.target.value); });
  }
  if (opacityEl) {
    opacityEl.value = st.opacity ?? 1;
    opacityEl.oninput = (e) => set(() => { st.opacity = Number(e.target.value); });
  }
  const shapeStrokeOn = document.getElementById('inspShapeStrokeOn');
  if (shapeStrokeOn) {
    shapeStrokeOn.checked = st.strokeEnabled !== false;
    shapeStrokeOn.onchange = () => set(() => {
      st.strokeEnabled = shapeStrokeOn.checked;
      if (st.strokeEnabled && st.strokeWidth <= 0) st.strokeWidth = 2;
      toggleShapeEffectRows();
    });
  }
  const shapeShadowOn = document.getElementById('inspShapeShadowOn');
  if (shapeShadowOn) {
    shapeShadowOn.checked = st.shadowEnabled !== false;
    shapeShadowOn.onchange = () => set(() => {
      st.shadowEnabled = shapeShadowOn.checked;
      if (st.shadowEnabled && st.shadowBlur <= 0) st.shadowBlur = 12;
      toggleShapeEffectRows();
    });
  }
  if (strokeEl) {
    strokeEl.value = st.stroke || '#5b8def';
    strokeEl.oninput = (e) => set(() => {
      st.stroke = e.target.value;
      if (shapeStrokeOn && !shapeStrokeOn.checked) {
        st.strokeEnabled = true;
        shapeStrokeOn.checked = true;
        toggleShapeEffectRows();
      }
    });
  }
  if (strokeWEl) {
    strokeWEl.value = st.strokeWidth;
    strokeWEl.oninput = (e) => set(() => {
      st.strokeWidth = Number(e.target.value);
      if (shapeStrokeOn && !shapeStrokeOn.checked && st.strokeWidth > 0) {
        st.strokeEnabled = true;
        shapeStrokeOn.checked = true;
        toggleShapeEffectRows();
      }
    });
  }
  const radiusEl = document.getElementById('inspShapeRadius');
  if (radiusEl) {
    radiusEl.value = st.borderRadius ?? 0;
    radiusEl.oninput = (e) => set(() => { st.borderRadius = Number(e.target.value); });
  }
  const shadowX = document.getElementById('inspShapeShadowX');
  const shadowY = document.getElementById('inspShapeShadowY');
  const shadowBlur = document.getElementById('inspShapeShadowBlur');
  const shadowColor = document.getElementById('inspShapeShadowColor');
  if (shadowX) {
    shadowX.value = st.shadowX ?? 0;
    shadowX.oninput = (e) => set(() => { st.shadowX = Number(e.target.value); });
  }
  if (shadowY) {
    shadowY.value = st.shadowY ?? 4;
    shadowY.oninput = (e) => set(() => { st.shadowY = Number(e.target.value); });
  }
  if (shadowBlur) {
    shadowBlur.value = st.shadowBlur ?? 12;
    shadowBlur.oninput = (e) => set(() => { st.shadowBlur = Number(e.target.value); });
  }
  if (shadowColor) {
    shadowColor.value = rgbaToHex(st.shadowColor) || '#000000';
    shadowColor.oninput = (e) => set(() => { st.shadowColor = hexToRgba(e.target.value, 0.45); });
  }
  const labelStrokeOn = document.getElementById('inspShapeLabelStrokeOn');
  if (labelStrokeOn) {
    labelStrokeOn.checked = ls.strokeEnabled === true;
    labelStrokeOn.onchange = () => set(() => {
      ls.strokeEnabled = labelStrokeOn.checked;
      if (ls.strokeEnabled && ls.strokeWidth <= 0) ls.strokeWidth = 2;
      toggleShapeLabelEffectRows();
    }, true);
  }
  const labelShadowOn = document.getElementById('inspShapeLabelShadowOn');
  if (labelShadowOn) {
    labelShadowOn.checked = ls.shadowEnabled === true;
    labelShadowOn.onchange = () => set(() => {
      ls.shadowEnabled = labelShadowOn.checked;
      if (ls.shadowEnabled && ls.shadowBlur <= 0) ls.shadowBlur = 14;
      toggleShapeLabelEffectRows();
    }, true);
  }
  const labelStrokeW = document.getElementById('inspShapeLabelStrokeW');
  if (labelStrokeW) {
    labelStrokeW.value = ls.strokeWidth ?? 2;
    labelStrokeW.oninput = (e) => set(() => { ls.strokeWidth = Number(e.target.value); }, true);
  }
  const labelStrokeColor = document.getElementById('inspShapeLabelStrokeColor');
  if (labelStrokeColor) {
    labelStrokeColor.value = ls.strokeColor || '#000000';
    labelStrokeColor.oninput = (e) => set(() => { ls.strokeColor = e.target.value; }, true);
  }
  const labelShadowX = document.getElementById('inspShapeLabelShadowX');
  const labelShadowY = document.getElementById('inspShapeLabelShadowY');
  const labelShadowBlur = document.getElementById('inspShapeLabelShadowBlur');
  const labelShadowColor = document.getElementById('inspShapeLabelShadowColor');
  if (labelShadowX) {
    labelShadowX.value = ls.shadowX ?? 0;
    labelShadowX.oninput = (e) => set(() => { ls.shadowX = Number(e.target.value); }, true);
  }
  if (labelShadowY) {
    labelShadowY.value = ls.shadowY ?? 4;
    labelShadowY.oninput = (e) => set(() => { ls.shadowY = Number(e.target.value); }, true);
  }
  if (labelShadowBlur) {
    labelShadowBlur.value = ls.shadowBlur ?? 14;
    labelShadowBlur.oninput = (e) => set(() => { ls.shadowBlur = Number(e.target.value); }, true);
  }
  if (labelShadowColor) {
    labelShadowColor.value = rgbaToHex(ls.shadowColor) || '#000000';
    labelShadowColor.oninput = (e) => set(() => { ls.shadowColor = hexToRgba(e.target.value, 0.85); }, true);
  }
  toggleShapeInspectorRows();
  toggleShapeEffectRows();
  toggleShapeLabelEffectRows();
}

function isEditorOpen() {
  return appWorkspaceMode === 'slide-edit' || appWorkspaceMode === 'reflow';
}

function updateEditorStripSelection(prevIndex, nextIndex) {
  const thumbs = document.querySelectorAll('#slideEditStrip .strip-thumb');
  if (thumbs.length !== editorSongData.slides.length) return false;
  if (prevIndex >= 0 && thumbs[prevIndex]) thumbs[prevIndex].classList.remove('active');
  if (nextIndex >= 0 && thumbs[nextIndex]) {
    thumbs[nextIndex].classList.add('active');
    thumbs[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  return true;
}

function editorSelectSlide(index) {
  if (appWorkspaceMode === 'reflow') {
    if (index >= 0 && index < editorSongData.slides.length) scrollReflowToSlide(index);
    return;
  }
  if (index < 0 || index >= editorSongData.slides.length) return;
  const prevIndex = editorSlideIndex;
  const prevLayer = selectedLayerId ? getLayerById(selectedLayerId) : null;
  editorSlideIndex = index;
  const slide = editorSongData.slides[index];
  selectedLayerId = pickLayerForSlide(slide, prevLayer);
  if (!updateEditorStripSelection(prevIndex, index)) renderSlideStrip();
  layoutSlideEditCanvas();
  paintEditorCanvas();
  requestAnimationFrame(() => relayoutEditorStage());
  refreshInspectorForLayerSwitch(prevLayer, selectedLayerId ? getLayerById(selectedLayerId) : null);
  updateWorkspaceHeadForMode();
  updateEditorMeta();
}

function duplicateCurrentSlide() {
  if (editorContext.singleSlide) return;
  const slide = getCurrentSlide();
  if (!slide) return;
  const copy = SE.duplicateSlide(slide);
  editorSongData.slides.splice(editorSlideIndex + 1, 0, copy);
  editorSlideIndex += 1;
  commitEditorChange();
}

function deleteCurrentSlide() {
  if (editorContext.singleSlide) return;
  if (editorSongData.slides.length <= 1) return;
  editorSongData.slides.splice(editorSlideIndex, 1);
  editorSlideIndex = Math.min(editorSlideIndex, editorSongData.slides.length - 1);
  selectedLayerId = null;
  commitEditorChange();
}

function deleteSelectedLayer() {
  const slide = getCurrentSlide();
  if (!slide || !selectedLayerId) return;
  SE.removeLayer(slide, selectedLayerId);
  selectedLayerId = null;
  commitEditorChange();
}

function duplicateSelectedLayer() {
  const slide = getCurrentSlide();
  if (!slide || !selectedLayerId) return;
  const newId = SE.duplicateLayer(slide, selectedLayerId);
  if (newId) { selectedLayerId = newId; commitEditorChange(); }
}

function copySelectedLayer() {
  const layer = getLayerById(selectedLayerId);
  if (layer) layerClipboard = JSON.parse(JSON.stringify(layer));
}

function pasteLayerClipboard() {
  const slide = getCurrentSlide();
  if (!slide || !layerClipboard) return;
  const copy = SE.normalizeLayer(JSON.parse(JSON.stringify(layerClipboard)));
  copy.id = SE.uid();
  copy.x = Math.min(copy.x + 3, 92);
  copy.y = Math.min(copy.y + 3, 92);
  slide.layers.push(copy);
  selectedLayerId = copy.id;
  commitEditorChange();
}

function cycleLayerSelection(dir) {
  const slide = getCurrentSlide();
  if (!slide?.layers?.length) return;
  const ids = slide.layers.map((l) => l.id);
  if (!selectedLayerId) {
    selectedLayerId = dir > 0 ? ids[0] : ids[ids.length - 1];
  } else {
    const i = ids.indexOf(selectedLayerId);
    const j = (i + dir + ids.length) % ids.length;
    selectedLayerId = ids[j];
  }
  renderEditorCanvas();
  renderInspector();
}

function nudgeSelectedLayer(e, shortcuts) {
  const layer = getLayerById(selectedLayerId);
  if (!layer) return false;
  const step = SC.matchAction(e, shortcuts, 'editorNudgeLarge') ? 5 : 1;
  let dx = 0; let dy = 0;
  if (e.key === 'ArrowLeft') dx = -step;
  if (e.key === 'ArrowRight') dx = step;
  if (e.key === 'ArrowUp') dy = -step;
  if (e.key === 'ArrowDown') dy = step;
  SE.nudgeLayer(layer, dx, dy);
  paintEditorCanvas();
  syncInspectorTransformInputs(layer);
  return true;
}

function saveEditorFromShortcut() {
  if (appWorkspaceMode === 'reflow') document.getElementById('btnSaveReflow')?.click();
  else if (appWorkspaceMode === 'slide-edit' || appWorkspaceMode === 'theme-edit') {
    document.getElementById('btnSaveSlideEdit')?.click();
  }
}

function openEditorForCurrentSong() {
  return enterSlideEditWorkspace();
}

function mediaSourceKey(item) {
  if (!item) return '';
  return String(item.path || item.src || item.id || '').trim();
}

function applyBackgroundMediaItem(item) {
  if (!item) return false;
  layerVisibility.media = true;
  updateMacroBarUI();
  activeMediaId = item.id;
  renderMediaLibrary();
  renderPreviewBackground(item);
  ipcRenderer.send('background-set', item.id);
  if (!isBlackout && activeSlideIndex >= 0 && activeSlideIndex < currentSlides.length) {
    sendBroadcastFullState(currentSlides[activeSlideIndex], { source: 'media-sync' });
  }
  return true;
}

function cycleBackground(dir) {
  if (!mediaLibrary.length) return;
  let idx = mediaLibrary.findIndex((m) => m.id === activeMediaId);
  if (idx < 0) idx = dir > 0 ? -1 : 0;
  idx = (idx + dir + mediaLibrary.length) % mediaLibrary.length;
  applyBackgroundMediaItem(mediaLibrary[idx]);
}

function getSelectedTextLayer() {
  const layer = getLayerById(selectedLayerId);
  if (layer?.type === 'text') return layer;
  const slide = getCurrentSlide();
  return slide?.layers?.find((l) => l.type === 'text') || null;
}

function adjustTextFontSize(delta) {
  const layer = getSelectedTextLayer();
  if (!layer) return;
  layer.style.fontSize = clamp((layer.style.fontSize || 5) + delta, 2, 12);
  commitEditorChange();
}

function cutSelectedLayer() {
  copySelectedLayer();
  deleteSelectedLayer();
}

function editorDeselectAction() {
  const prevLayer = selectedLayerId ? getLayerById(selectedLayerId) : null;
  selectedLayerId = null;
  updateEditorLayerSelection();
  refreshInspectorForLayerSwitch(prevLayer, null);
}

function editorSelectAllAction() {
  const slide = getCurrentSlide();
  if (!slide?.layers?.length) return;
  selectedLayerId = slide.layers[slide.layers.length - 1].id;
  renderEditorCanvas();
  renderInspector();
}

function fitEditorCanvas() {
  layoutSlideEditCanvas();
  refreshEditorStripThumbnails();
  const vp = document.querySelector('#workspaceSlideEdit .pp-edit-center .pp-canvas-viewport');
  vp?.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
}

function refreshEditorStripThumbnails() {
  document.querySelectorAll('#slideEditStrip .strip-thumb').forEach((thumb, i) => {
    const inner = thumb.querySelector('.thumb-inner');
    if (inner && editorSongData.slides[i]) renderSlideThumbnail(editorSongData.slides[i], inner);
  });
}

function reflowSplitAtCursor() {
  const ta = reflowTextarea;
  const s = ta.selectionStart;
  const end = ta.selectionEnd;
  ta.value = ta.value.slice(0, s) + '\n\n' + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = s + 2;
  onReflowInput();
}

function reflowSendRemainingToNextSlide() {
  const ta = reflowTextarea;
  const pos = ta.selectionStart;
  const after = ta.value.slice(pos).trim();
  if (!after) return;
  const before = ta.value.slice(0, pos).replace(/\n+$/, '');
  ta.value = `${before}\n\n${after}`;
  ta.selectionStart = ta.selectionEnd = before.length + 2;
  onReflowInput();
}

function switchToReflowTab() {
  setNavHighlight('reflow');
  enterReflowWorkspace();
}

function scrollReflowToSlide(index) {
  const text = reflowTextarea.value;
  const parts = text.split(/\n\s*\n/);
  let pos = 0;
  for (let i = 0; i < index && i < parts.length; i++) {
    pos += parts[i].length;
    while (pos < text.length && text[pos] === '\n') pos++;
  }
  reflowTextarea.focus();
  reflowTextarea.selectionStart = reflowTextarea.selectionEnd = pos;
  reflowHighlightIndex = index;
  editorSlideIndex = index;
  renderReflowMiniPreview();
}

let outputWindowVisible = true;

function updateOutputWindowUI(visible) {
  outputWindowVisible = Boolean(visible);
  const btn = document.getElementById('btnToggleOutput');
  const pill = document.getElementById('outputWindowStatus');
  const pillText = document.getElementById('outputWindowStatusText');
  const label = document.getElementById('btnToggleOutputLabel');
  if (pill) {
    pill.classList.toggle('on', outputWindowVisible);
    pill.classList.toggle('off', !outputWindowVisible);
  }
  if (pillText) pillText.textContent = I18N.t(outputWindowVisible ? 'outputOn' : 'outputOff');
  if (btn) {
    btn.classList.toggle('is-on', outputWindowVisible);
    btn.classList.toggle('is-off', !outputWindowVisible);
    btn.setAttribute('aria-pressed', outputWindowVisible ? 'true' : 'false');
  }
  if (label) label.textContent = I18N.t(outputWindowVisible ? 'outputToggleOn' : 'outputToggleOff');
}

function toggleOutputWindow() {
  ipcRenderer.send('output:toggle');
}

function handleGlobalShortcut(e) {
  const sc = appSettings.shortcuts;
  if (SC.matchAction(e, sc, 'liveToggleOutput')) {
    e.preventDefault();
    toggleOutputWindow();
    return true;
  }
  if (SC.matchAction(e, sc, 'navSlides')) {
    e.preventDefault();
    if (isEditorOpen()) exitEditWorkspace();
    return true;
  }
  if (SC.matchAction(e, sc, 'navSlideEdit')) {
    e.preventDefault();
    setNavHighlight('editor');
    enterSlideEditWorkspace();
    return true;
  }
  if (SC.matchAction(e, sc, 'navReflow')) {
    e.preventDefault();
    setNavHighlight('reflow');
    enterReflowWorkspace();
    return true;
  }
  if (SC.matchAction(e, sc, 'openPreferences')) {
    e.preventDefault();
    openSettings();
    return true;
  }
  if (SC.matchAction(e, sc, 'librarySearch')) {
    e.preventDefault();
    const inp = document.getElementById('librarySearch');
    inp?.focus();
    inp?.select();
    if (librarySearchQuery) setLibrarySearchOpen(true);
    return true;
  }
  if (SC.matchAction(e, sc, 'openEditor')) {
    e.preventDefault();
    openEditorForCurrentSong();
    return true;
  }
  return false;
}

function handleEditorShortcut(e) {
  const sc = appSettings.shortcuts;
  if (SC.matchAction(e, sc, 'editorUndo')) {
    e.preventDefault();
    editorUndoAction();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorRedo')) {
    e.preventDefault();
    editorRedoAction();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorSave')) {
    e.preventDefault();
    saveEditorFromShortcut();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorOpenReflow')) {
    e.preventDefault();
    switchToReflowTab();
    return true;
  }
  if (appWorkspaceMode === 'reflow' && document.activeElement === reflowTextarea) {
    if (SC.matchAction(e, sc, 'editorReflowSplit')) {
      e.preventDefault();
      reflowSplitAtCursor();
      return true;
    }
    if (SC.matchAction(e, sc, 'editorReflowSendNext')) {
      e.preventDefault();
      reflowSendRemainingToNextSlide();
      return true;
    }
    if (SC.matchAction(e, sc, 'editorReflowNextSlide')) {
      e.preventDefault();
      editorSelectSlide(Math.min(editorSlideIndex + 1, editorSongData.slides.length - 1));
      return true;
    }
    if (SC.matchAction(e, sc, 'editorReflowPrevSlide')) {
      e.preventDefault();
      editorSelectSlide(Math.max(editorSlideIndex - 1, 0));
      return true;
    }
    if (SC.matchAction(e, sc, 'editorSave')) return true;
    return false;
  }
  if (SC.matchAction(e, sc, 'editorToggleGrid')) {
    e.preventDefault();
    toggleEditorGrid();
    return true;
  }
  if (appWorkspaceMode === 'slide-edit') {
    if (SC.matchAction(e, sc, 'editorNextSlide')) {
      e.preventDefault();
      editorSelectSlide(editorSlideIndex + 1);
      return true;
    }
    if (SC.matchAction(e, sc, 'editorPrevSlide')) {
      e.preventDefault();
      editorSelectSlide(editorSlideIndex - 1);
      return true;
    }
  }
  if (SC.matchAction(e, sc, 'editorCopyLayer')) {
    e.preventDefault();
    copySelectedLayer();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorPasteLayer')) {
    e.preventDefault();
    pasteLayerClipboard();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorCut')) {
    e.preventDefault();
    cutSelectedLayer();
    return true;
  }
  if (isTypingTarget()) return false;
  if (SC.matchAction(e, sc, 'editorDeselect')) {
    e.preventDefault();
    editorDeselectAction();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorSelectAll')) {
    e.preventDefault();
    editorSelectAllAction();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorAddSlide')) {
    e.preventDefault();
    editorSongData.slides.push(SE.createSlideFromText('새 슬라이드', {
      group: appSettings.defaultSlideGroup,
      fontSize: appSettings.defaultTextFontSize,
    }));
    editorSlideIndex = editorSongData.slides.length - 1;
    commitEditorChange();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorDuplicateSlide')) {
    e.preventDefault();
    duplicateCurrentSlide();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorDeleteLayer') || SC.matchAction(e, sc, 'editorDeleteSlide')) {
    e.preventDefault();
    if (selectedLayerId && getCurrentSlide()?.layers?.length > 1) deleteSelectedLayer();
    else deleteCurrentSlide();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorNextLayer')) {
    e.preventDefault();
    cycleLayerSelection(1);
    return true;
  }
  if (SC.matchAction(e, sc, 'editorPrevLayer')) {
    e.preventDefault();
    cycleLayerSelection(-1);
    return true;
  }
  if (SC.matchAction(e, sc, 'editorDuplicateLayer')) {
    e.preventDefault();
    duplicateSelectedLayer();
    return true;
  }
  if (SC.matchAction(e, sc, 'editorBold')) {
    const layer = getSelectedTextLayer();
    if (layer) {
      e.preventDefault();
      layer.style.fontWeight = layer.style.fontWeight === '700' ? '400' : '700';
      commitEditorChange();
      return true;
    }
  }
  if (SC.matchAction(e, sc, 'editorItalic')) {
    const layer = getSelectedTextLayer();
    if (layer) {
      e.preventDefault();
      layer.style.fontStyle = layer.style.fontStyle === 'italic' ? 'normal' : 'italic';
      commitEditorChange();
      return true;
    }
  }
  if (SC.matchAction(e, sc, 'editorUnderline')) {
    const layer = getSelectedTextLayer();
    if (layer) {
      e.preventDefault();
      layer.style.textDecoration = layer.style.textDecoration === 'underline' ? 'none' : 'underline';
      commitEditorChange();
      return true;
    }
  }
  if (SC.matchAction(e, sc, 'editorMakeBigger')) {
    e.preventDefault();
    adjustTextFontSize(0.25);
    return true;
  }
  if (SC.matchAction(e, sc, 'editorMakeSmaller')) {
    e.preventDefault();
    adjustTextFontSize(-0.25);
    return true;
  }
  if (SC.matchAction(e, sc, 'editorFitCanvas')) {
    e.preventDefault();
    fitEditorCanvas();
    return true;
  }
  const slide = getCurrentSlide();
  if (selectedLayerId && slide) {
    if (SC.matchAction(e, sc, 'editorBringForward')) {
      e.preventDefault();
      SE.reorderLayer(slide, selectedLayerId, 1);
      commitEditorChange(false);
      return true;
    }
    if (SC.matchAction(e, sc, 'editorSendBackward')) {
      e.preventDefault();
      SE.reorderLayer(slide, selectedLayerId, -1);
      commitEditorChange(false);
      return true;
    }
    if (SC.matchAction(e, sc, 'editorBringToFront')) {
      e.preventDefault();
      SE.bringLayerToFront(slide, selectedLayerId);
      commitEditorChange(false);
      return true;
    }
    if (SC.matchAction(e, sc, 'editorSendToBack')) {
      e.preventDefault();
      SE.sendLayerToBack(slide, selectedLayerId);
      commitEditorChange(false);
      return true;
    }
    if (SC.matchAction(e, sc, 'editorNudge') || SC.matchAction(e, sc, 'editorNudgeLarge')) {
      if (nudgeSelectedLayer(e, sc)) { e.preventDefault(); return true; }
    }
  }
  return false;
}

function tryGroupHotkeyJump(e) {
  if (appWorkspaceMode !== 'slides' || !currentSlides.length) return false;
  if (e.metaKey || e.ctrlKey || e.altKey || e.shiftKey) return false;
  const idx = SE.findSlideIndexByGroupKey(currentSlides, e.code);
  if (idx < 0) return false;
  e.preventDefault();
  selectSlide(idx);
  return true;
}

function scrollActiveSlideIntoView(behavior = 'smooth') {
  if (activeSlideIndex < 0 || !currentSongTitle || appWorkspaceMode !== 'slides') return;
  const run = () => {
    const card = findFilmstripCard(currentSongTitle, activeSlideIndex);
    if (!card) return;
    const scroller = slideGrid;
    const pad = 10;
    const s = scroller.getBoundingClientRect();
    const c = card.getBoundingClientRect();
    const outOfView = c.top < s.top + pad
      || c.bottom > s.bottom - pad
      || c.left < s.left + pad
      || c.right > s.right - pad;
    if (outOfView) {
      card.scrollIntoView({ behavior, block: 'nearest', inline: 'nearest' });
    }
  };
  requestAnimationFrame(() => requestAnimationFrame(run));
}

function advanceToNextPlaylistSong() {
  const songs = getActivePlaylistSongs();
  if (!songs.length || !currentSongTitle) return false;
  const idx = songs.indexOf(currentSongTitle);
  if (idx < 0 || idx >= songs.length - 1) return false;
  const nextTitle = songs[idx + 1];
  if (!songLibrary[nextTitle]) return false;
  loadSongToSlides(nextTitle, { selectFirstSlide: true });
  scrollPlaylistItemIntoView(nextTitle);
  scrollPlaylistTreeIntoView(playlistsState.activePlaylistId);
  return true;
}

function advanceLiveNextSlide() {
  if (!currentSlides.length) return;
  const next = activeSlideIndex < 0 ? 0 : activeSlideIndex + 1;
  if (next < currentSlides.length) {
    selectSlide(next);
    return;
  }
  if (appSettings.slideAdvanceWrap) {
    selectSlide(0);
    return;
  }
  if (appSettings.playlistAdvanceToNextSong !== false) {
    advanceToNextPlaylistSong();
  }
}

function handleLiveShortcut(e) {
  const sc = appSettings.shortcuts;
  if (tryGroupHotkeyJump(e)) return true;
  if (SC.matchAction(e, sc, 'liveNext')) {
    e.preventDefault();
    advanceLiveNextSlide();
    return true;
  }
  if (SC.matchAction(e, sc, 'livePrev')) {
    e.preventDefault();
    if (activeSlideIndex > 0) selectSlide(activeSlideIndex - 1);
    else if (appSettings.slideAdvanceWrap && currentSlides.length) selectSlide(currentSlides.length - 1);
    return true;
  }
  if (SC.matchAction(e, sc, 'liveNextBackground')) {
    e.preventDefault();
    cycleBackground(1);
    return true;
  }
  if (SC.matchAction(e, sc, 'livePrevBackground')) {
    e.preventDefault();
    cycleBackground(-1);
    return true;
  }
  if (SC.matchAction(e, sc, 'liveTrigger') && activeSlideIndex >= 0) {
    e.preventDefault();
    selectSlide(activeSlideIndex);
    return true;
  }
  if (SC.matchAction(e, sc, 'liveBlackout')) {
    e.preventDefault();
    setBlackout(!isBlackout);
    return true;
  }
  if (SC.matchAction(e, sc, 'liveClearAll')) {
    e.preventDefault();
    layerVisibility = { lyrics: false, media: false, design: false };
    updateLayerToggleUI();
    activeMediaId = null;
    renderMediaLibrary();
    renderPreviewBackground(null);
    ipcRenderer.send('macro-clear-all');
    return true;
  }
  if (SC.matchAction(e, sc, 'liveClearText')) {
    e.preventDefault();
    macroClearTextLayer();
    return true;
  }
  if (SC.matchAction(e, sc, 'liveClearMedia')) {
    e.preventDefault();
    macroClearBackgroundLayer();
    return true;
  }
  if (SC.matchAction(e, sc, 'liveClearProps')) {
    e.preventDefault();
    if (layerVisibility.design) toggleLayerVisibility('design');
    return true;
  }
  if (SC.matchAction(e, sc, 'liveLogo')) {
    e.preventDefault();
    toggleLogo();
    return true;
  }
  return false;
}

function hexToRgba(hex, a) {
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0, 2), 16);
  const g = parseInt(h.slice(2, 4), 16);
  const b = parseInt(h.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function rgbaToHex(c) {
  if (c?.startsWith('#')) return c;
  return '#4d8dff';
}
