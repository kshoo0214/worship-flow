<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Worship FLOW</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #output-root {
      position: fixed; inset: 0;
      display: block;
      background: #000;
      overflow: hidden;
    }
    #viewport {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
    }
    #stage {
      position: absolute;
      left: 0; top: 0;
      width: var(--stage-w, 1920px);
      height: var(--stage-h, 1080px);
      min-width: var(--stage-w, 1920px);
      min-height: var(--stage-h, 1080px);
      aspect-ratio: var(--stage-aspect, 16 / 9);
      flex-shrink: 0;
      transform-origin: top left;
      overflow: hidden;
      background: #000;
      container-type: size;
    }

    #bgStack {
      position: absolute; inset: 0; z-index: 0;
      background: #000;
      overflow: hidden;
    }
    .bg-pane {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity var(--fade-bg, 650ms) ease-in-out;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-pane.is-visible { opacity: 1; pointer-events: auto; }
    #bgStack.is-cleared .bg-pane { opacity: 0 !important; pointer-events: none; }
    .bg-pane video, .bg-pane img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .bg-pane video.is-on, .bg-pane img.is-on { display: block; }

    #slideStack {
      position: absolute; inset: 0; z-index: 5;
      overflow: hidden;
      pointer-events: none;
      opacity: 1;
      transition: opacity var(--fade-layer, 650ms) ease-out;
    }
    #slideStack.layer-cleared { opacity: 0; }
    body.text-cleared .slide-layer:has(.slide-layer-text) {
      opacity: 0 !important;
      visibility: hidden;
      transition: opacity var(--fade-lyrics, 550ms) ease-out, visibility var(--fade-lyrics, 550ms) ease-out;
    }
    .slide-pane {
      position: absolute; inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity var(--fade-layer, 650ms) ease-out;
      overflow: hidden;
    }
    .slide-pane.is-visible { opacity: 1; }
    #fgLayer {
      position: absolute; inset: 0; z-index: 6;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
    }
    #logoLayer {
      position: absolute; inset: 0; z-index: 120;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; pointer-events: none;
      background: rgba(0,0,0,0.92);
      transition: opacity var(--fade-layer, 650ms) ease-out, visibility var(--fade-layer, 650ms) ease-out;
    }
    #logoLayer.is-visible { opacity: 1; visibility: visible; }
    #logoLayer img, #logoLayer video {
      max-width: 92%; max-height: 92%; object-fit: contain;
      filter: drop-shadow(0 4px 24px rgba(0,0,0,0.55));
    }
    #propLayer {
      position: absolute; inset: 0; z-index: 90;
      display: flex; flex-direction: column;
      pointer-events: none; opacity: 0; visibility: hidden;
      transition: opacity var(--fade-layer, 650ms) ease-out, visibility var(--fade-layer, 650ms) ease-out;
      background: transparent;
    }
    #propLayer.is-visible { opacity: 1; visibility: visible; }
    #propLayer[data-position="top"] { justify-content: flex-start; }
    #propLayer[data-position="center"] { justify-content: center; }
    #propLayer[data-position="bottom"] { justify-content: flex-end; }
    #propText {
      max-width: 92%; margin: 32px 48px;
      padding: 24px 40px;
      font-weight: 800;
      text-align: center; white-space: pre-wrap; word-break: keep-all;
      border-radius: 12px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.45);
    }
    #propText.is-boxed {
      position: absolute; margin: 0; max-width: none;
      display: flex; align-items: center; justify-content: center;
    }
    #announceLayer {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 95;
      padding: 20px 48px 32px;
      background: linear-gradient(transparent, rgba(0,0,0,0.88));
      pointer-events: none; opacity: 0; visibility: hidden;
      transition: opacity var(--fade-lyrics, 550ms) ease-out, visibility var(--fade-lyrics, 550ms) ease-out;
    }
    #announceLayer.is-visible { opacity: 1; visibility: visible; }
    #announceText {
      font-size: clamp(22px, 2.5vw, 36px); font-weight: 700;
      text-align: center; color: #fde68a; white-space: pre-wrap;
    }
    body.design-cleared .slide-layer-shape,
    body.design-cleared .slide-layer-shape-label { opacity: 0 !important; }
    body.is-blackout #slideStack { opacity: 0; transition-duration: calc(var(--fade-layer, 650ms) * 0.5); }
    body.is-blackout #bgStack {
      opacity: 0 !important;
      visibility: hidden;
      transition: opacity calc(var(--fade-layer, 650ms) * 0.5) ease-out;
    }
    body.is-blackout #lyricsLayer {
      opacity: 0 !important;
      visibility: hidden;
    }
    body.is-blackout #propLayer,
    body.is-blackout #announceLayer,
    body.is-blackout #logoLayer {
      opacity: 0 !important;
      visibility: hidden !important;
    }

    body.is-relay #output-root,
    body.is-relay #stage,
    body.is-relay #bgStack,
    body.is-relay #logoLayer {
      background: transparent !important;
    }
    body.is-relay #bgStack,
    body.is-relay #logoLayer {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none;
    }
    /* macOS titled relay window — keep capture-friendly chrome visible in OBS list */
    body.is-relay.is-macos-relay #output-root {
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #lyricsLayer {
      position: absolute; inset: 0; z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 var(--lyrics-pad-x, 96px) var(--lyrics-pad-b, 108px);
      pointer-events: none;
      opacity: 1;
      visibility: visible;
      transition: opacity var(--fade-lyrics, 550ms) ease-out, visibility var(--fade-lyrics, 550ms) ease-out;
    }
    #lyricsLayer.hidden,
    #lyricsLayer.layer-cleared {
      opacity: 0;
      visibility: hidden;
    }
    #lyricsText {
      max-width: var(--lyrics-max-w, 1766px);
      text-align: center;
      white-space: pre-wrap;
      word-break: keep-all;
      line-height: 1.4;
      font-weight: 700;
      -webkit-font-smoothing: antialiased;
    }

    .slide-layer { pointer-events: none; }
    .slide-layer-text { -webkit-font-smoothing: antialiased; }

    #outputGear { display: none; }
  </style>
</head>
<body>
  <div id="output-root">
    <div id="viewport">
      <div id="stage">
        <div id="bgStack">
          <div class="bg-pane is-visible" id="bgPaneA" data-pane="A">
            <video class="bg-video" loop playsinline webkit-playsinline preload="auto"></video>
            <img class="bg-image" alt="" />
          </div>
          <div class="bg-pane" id="bgPaneB" data-pane="B">
            <video class="bg-video" loop playsinline webkit-playsinline preload="auto"></video>
            <img class="bg-image" alt="" />
          </div>
        </div>
        <div id="slideStack">
          <div class="slide-pane is-visible" id="slidePaneA"></div>
          <div class="slide-pane" id="slidePaneB"></div>
        </div>
        <div id="fgLayer" aria-hidden="true"></div>
        <div id="logoLayer" aria-hidden="true"><img alt="" /><video class="logo-video" muted playsinline loop></video></div>
        <div id="propLayer" aria-hidden="true"><div id="propText"></div></div>
        <div id="announceLayer" aria-hidden="true"><div id="announceText"></div></div>
        <div id="lyricsLayer" class="hidden" aria-hidden="true">
          <div id="lyricsText"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const path = require('path');
    const fs = require('fs');
    const { pathToFileURL } = require('url');
    const SlideEngine = require('./slide-engine');
    const AppSettings = require('./app-settings');
    const AppPaths = require('./app-paths');
    const { ipcRenderer } = require('electron');

    const urlRole = new URLSearchParams(window.location.search).get('role');
    let displayRole = urlRole === 'relay' ? 'relay' : 'program';
    const APP_DISPLAY_TITLE = displayRole === 'relay' ? 'Worship FLOW — Relay' : 'Worship FLOW — Program';
    document.title = APP_DISPLAY_TITLE;
    let lastBaseSlide = null;
    let lastContent = null;

    const MEDIA_ASSETS_DIR = AppPaths.getMediaAssetsDir();

    const stage = document.getElementById('stage');
    const bgStack = document.getElementById('bgStack');
    const bgPaneA = document.getElementById('bgPaneA');
    const bgPaneB = document.getElementById('bgPaneB');
    const slideStack = document.getElementById('slideStack');
    const slidePaneA = document.getElementById('slidePaneA');
    const slidePaneB = document.getElementById('slidePaneB');
    const fgLayer = document.getElementById('fgLayer');
    const logoLayer = document.getElementById('logoLayer');
    const logoImg = logoLayer?.querySelector('img');
    const propLayer = document.getElementById('propLayer');
    const propText = document.getElementById('propText');
    const announceLayer = document.getElementById('announceLayer');
    const announceText = document.getElementById('announceText');
    const lyricsLayer = document.getElementById('lyricsLayer');
    const bodyEl = document.body;

    const panes = [bgPaneA, bgPaneB];
    const slidePanes = [slidePaneA, slidePaneB];
    let activeSlidePane = slidePaneA;
    let activeSlideKey = '';
    let slideClearTimer = null;
    let activePaneEl = bgPaneA;
    let activeBgKey = '';
    let bgTeardownTimer = null;
    let mediaClearTimer = null;
    let lastSlideSeq = 0;
    let lastMacroSeq = 0;
    let lastShownSlideKey = '';
    let lastSlideState = null;
    let appSettings = AppSettings.loadSettings();
    let slideCleared = false;
    let slideTextCleared = false;
    let mediaCleared = false;

    function resolveMediaFileUrl(filename) {
      if (!filename) return null;
      const fp = path.join(MEDIA_ASSETS_DIR, path.basename(filename));
      if (!fs.existsSync(fp)) return null;
      return pathToFileURL(fp).href;
    }

    function applyMasterVolume() {
      const vol = (appSettings.masterVolume ?? 100) / 100;
      const muted = outputBlackoutActive && appSettings.muteMediaOnBlackout !== false;
      document.querySelectorAll('video').forEach((v) => {
        v.volume = muted ? 0 : vol;
        v.muted = muted;
      });
    }
    /** Program output forced black while controller is in blackout (stealth cue). */
    let outputBlackoutActive = false;

    function getStageSize() {
      if (displayRole === 'relay') {
        const relay = AppSettings.getRelayResolution(appSettings);
        return { width: relay.width, height: relay.height };
      }
      return SlideEngine.getStageDimensions(appSettings);
    }

    function applyStageDimensions() {
      const { width, height } = getStageSize();
      stage.style.width = `${width}px`;
      stage.style.height = `${height}px`;
      stage.style.minWidth = `${width}px`;
      stage.style.minHeight = `${height}px`;
      stage.style.left = '0';
      stage.style.top = '0';
      document.documentElement.style.setProperty('--stage-w', `${width}px`);
      document.documentElement.style.setProperty('--stage-h', `${height}px`);
      document.documentElement.style.setProperty('--stage-aspect', `${width} / ${height}`);
      document.documentElement.style.setProperty('--lyrics-max-w', `${Math.round((1766 / 1920) * width)}px`);
      document.documentElement.style.setProperty('--lyrics-pad-x', `${Math.round((96 / 1920) * width)}px`);
      document.documentElement.style.setProperty('--lyrics-pad-b', `${Math.round((108 / 1080) * height)}px`);
    }

    function fitStageToViewport() {
      const vp = document.getElementById('viewport');
      if (!vp || !vp.clientWidth || !vp.clientHeight) return;
      const { width, height } = getStageSize();
      const autoFit = appSettings.outputAutoFit !== false;
      const userScale = (Number(appSettings.outputDisplayScale) || 100) / 100;
      let fitScale = 1;
      if (autoFit && width > 0 && height > 0) {
        const sx = vp.clientWidth / width;
        const sy = vp.clientHeight / height;
        fitScale = displayRole === 'program' ? Math.max(sx, sy) : Math.min(sx, sy);
      }
      const scale = Math.round(fitScale * userScale * 1e6) / 1e6;
      const scaledW = width * scale;
      const scaledH = height * scale;
      if (displayRole === 'program' && autoFit) {
        const offsetX = Math.floor((vp.clientWidth - scaledW) / 2);
        const offsetY = Math.floor((vp.clientHeight - scaledH) / 2);
        stage.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      } else {
        stage.style.transform = `scale(${scale})`;
      }
      stage.style.transformOrigin = 'top left';
    }

    function forceFitStage() {
      applyStageDimensions();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => fitStageToViewport());
      });
    }

    function applyAppSettings(s) {
      appSettings = AppSettings.normalize(s || appSettings);
      const bgMs = appSettings.backgroundFadeMs;
      const lyrMs = appSettings.lyricsFadeMs;
      const layerMs = appSettings.layerFadeMs;
      document.documentElement.style.setProperty('--fade-bg', `${bgMs}ms`);
      document.documentElement.style.setProperty('--fade-lyrics', `${lyrMs}ms`);
      document.documentElement.style.setProperty('--fade-layer', `${layerMs}ms`);
      panes.forEach((p) => {
        const v = p.querySelector('.bg-video');
        if (v) {
          v.loop = appSettings.loopBackgroundVideo;
          ensureBgVideoPlaying(v);
        }
      });
      applyStageDimensions();
      fitStageToViewport();
      applyMasterVolume();
      if (lastSlideState?.slide) crossfadeSlide(lastSlideState.slide);
    }

    applyAppSettings(appSettings);
    if (displayRole === 'relay') {
      bodyEl.classList.add('is-relay');
      if (process.platform === 'darwin') bodyEl.classList.add('is-macos-relay');
    }
    ipcRenderer.on('settings:sync', (_e, s) => applyAppSettings(s));
    ipcRenderer.send('settings:get');
    window.addEventListener('resize', () => fitStageToViewport());
    ipcRenderer.on('output:viewport-changed', () => forceFitStage());
    ipcRenderer.on('output:force-fit', () => forceFitStage());

    function mediaSrcKey(src) {
      if (!src) return '';
      try { return new URL(src).href; } catch (_) { return String(src); }
    }

    function mediaSrcMatches(el, src) {
      if (!el || !src) return false;
      return mediaSrcKey(el.src) === mediaSrcKey(src);
    }

    function getPaneMedia(pane) {
      return {
        video: pane.querySelector('.bg-video'),
        image: pane.querySelector('.bg-image'),
      };
    }

    function ensureBgVideoPlaying(video) {
      if (!video?.classList.contains('is-on') || !video.src) return;
      video.loop = appSettings.loopBackgroundVideo !== false;
      if (video.paused || video.ended) video.play().catch(() => {});
    }

    function wireBgVideoElement(video) {
      if (!video || video.dataset.bgWired === '1') return;
      video.dataset.bgWired = '1';
      video.addEventListener('ended', () => ensureBgVideoPlaying(video));
      video.addEventListener('stalled', () => ensureBgVideoPlaying(video));
      video.addEventListener('pause', () => {
        if (video.classList.contains('is-on') && !outputBlackoutActive && !mediaCleared) {
          requestAnimationFrame(() => ensureBgVideoPlaying(video));
        }
      });
    }

    panes.forEach((pane) => wireBgVideoElement(pane.querySelector('.bg-video')));

    function hidePaneMedia(pane) {
      const { video, image } = getPaneMedia(pane);
      if (video) {
        video.pause();
        video.removeAttribute('src');
        video.load();
        video.classList.remove('is-on');
      }
      if (image) {
        image.removeAttribute('src');
        image.classList.remove('is-on');
      }
    }

    function teardownPane(pane) {
      hidePaneMedia(pane);
    }

    function resetPaneMedia(pane) {
      const { video, image } = getPaneMedia(pane);
      if (video) {
        video.classList.remove('is-on');
        video.pause();
        video.removeAttribute('src');
        video.load();
      }
      if (image) {
        image.classList.remove('is-on');
        image.removeAttribute('src');
      }
    }

    function mountBackgroundToPane(pane, data) {
      const { video, image } = getPaneMedia(pane);
      resetPaneMedia(pane);
      if (data.type === 'color') {
        pane.style.backgroundColor = data.color || '#000000';
        pane.style.opacity = String(data.opacity ?? 1);
        return;
      }
      pane.style.opacity = '1';
      pane.style.backgroundColor = '#000';
      if (data.type === 'video' && video) {
        wireBgVideoElement(video);
        video.classList.add('is-on');
        video.loop = appSettings.loopBackgroundVideo !== false;
        video.src = data.src;
        video.load();
        const onReady = () => {
          video.removeEventListener('canplay', onReady);
          video.removeEventListener('error', onReady);
          video.play().catch(() => {});
        };
        video.addEventListener('canplay', onReady);
        video.addEventListener('error', onReady);
        if (video.readyState >= 2) onReady();
        applyMasterVolume();
        ensureBgVideoPlaying(video);
        return;
      }
      if (data.type === 'image' && image) {
        image.classList.add('is-on');
        image.src = data.src;
      }
    }

    function crossfadeBackground(data) {
      if (!data) return;
      if (outputBlackoutActive) return;
      if (data.type !== 'color' && !data.src) return;
      const key = data.type === 'color'
        ? `${data.id || ''}:color:${data.color || '#000000'}:${data.opacity ?? 1}`
        : `${data.id || ''}:${data.type}:${data.src}`;

      clearTimeout(bgTeardownTimer);
      bgTeardownTimer = null;
      bgStack.classList.remove('is-cleared');
      mediaCleared = false;
      activeBgKey = key;

      const hidden = activePaneEl === bgPaneA ? bgPaneB : bgPaneA;
      hidden.classList.remove('is-visible');
      resetPaneMedia(hidden);

      mountBackgroundToPane(activePaneEl, data);
      activePaneEl.classList.add('is-visible');
    }

    function slideFingerprint(slide) {
      if (!slide) return '';
      const norm = SlideEngine.prepareSlideForBroadcast(slide);
      return `${norm.id || ''}:${JSON.stringify(norm)}`;
    }

    function renderSlideToPane(pane, slide) {
      const { height } = getStageSize();
      SlideEngine.renderSlide(slide, pane, {
        clear: true,
        foregroundOnly: true,
        scale: 1,
        fontUnit: 'px',
        refHeight: height,
        resolveFileUrl: resolveMediaFileUrl,
      });
      pane.querySelectorAll('video').forEach((v) => {
        v.loop = appSettings.loopBackgroundVideo !== false;
        applyMasterVolume();
      });
    }

    /** 단일 활성 패널에 직접 렌더 (A/B 토글로 인한 누락 방지) */
    function crossfadeSlide(slide) {
      if (!slide) {
        clearTextLayer({ wipe: true });
        return;
      }
      const key = slideFingerprint(slide);
      slideStack.classList.remove('layer-cleared');
      slideCleared = false;
      slideTextCleared = false;
      bodyEl.classList.remove('text-cleared');
      setDesignCleared(!SlideEngine.hasDesignLayers(slide));
      clearTimeout(slideClearTimer);

      if (!activeSlidePane) activeSlidePane = slidePaneA;

      renderSlideToPane(activeSlidePane, slide);
      activeSlidePane.classList.add('is-visible');
      const hidden = activeSlidePane === slidePaneA ? slidePaneB : slidePaneA;
      hidden.classList.remove('is-visible');
      hidden.innerHTML = '';
      activeSlideKey = key;
    }

    function sendSlideAck(data, slide, extra = {}) {
      if (!data?.transferId) return;
      ipcRenderer.send('output:slide-ack', {
        transferId: data.transferId,
        slideId: slide?.id || data.slideId || null,
        seq: data.seq || 0,
        ok: true,
        timestamp: Date.now(),
        ...extra,
      });
    }

    function clearTextLayer(opts = {}) {
      const wipe = opts.wipe === true;
      slideTextCleared = true;
      bodyEl.classList.add('text-cleared');
      if (wipe) {
        slideCleared = true;
        slideStack.classList.add('layer-cleared');
        clearTimeout(slideClearTimer);
        const fadeMs = Math.max(appSettings.lyricsFadeMs, appSettings.layerFadeMs);
        slideClearTimer = setTimeout(() => {
          if (!slideCleared) return;
          slidePanes.forEach((p) => { p.innerHTML = ''; p.classList.remove('is-visible'); });
          slideStack.classList.remove('layer-cleared');
          activeSlideKey = '';
          lastShownSlideKey = '';
          activeSlidePane = slidePaneA;
          slidePaneA.classList.add('is-visible');
        }, fadeMs);
        return;
      }
      clearTimeout(slideClearTimer);
    }

    function restoreTextLayerIfNeeded() {
      slideCleared = false;
      slideTextCleared = false;
      clearTimeout(slideClearTimer);
      slideStack.classList.remove('layer-cleared');
      bodyEl.classList.remove('text-cleared');
      slideStack.style.opacity = '';
      if (!slidePanes.some((p) => p.classList.contains('is-visible'))) {
        activeSlidePane.classList.add('is-visible');
      }
    }

    function clearMediaLayer() {
      mediaCleared = true;
      clearTimeout(mediaClearTimer);
      bgStack.classList.add('is-cleared');
      panes.forEach((p) => p.classList.remove('is-visible'));
      mediaClearTimer = setTimeout(() => {
        if (!mediaCleared) return;
        panes.forEach(teardownPane);
        bgStack.classList.remove('is-cleared');
        activeBgKey = '';
        activePaneEl = bgPaneA;
        bgPaneA.classList.add('is-visible');
      }, appSettings.backgroundFadeMs);
    }

    function restoreMediaLayer() {
      mediaCleared = false;
      clearTimeout(mediaClearTimer);
      bgStack.classList.remove('is-cleared');
      if (!activePaneEl) activePaneEl = bgPaneA;
      if (activeBgKey) {
        activePaneEl.classList.add('is-visible');
        panes.forEach((p) => p.classList.toggle('is-visible', p === activePaneEl));
        const { video } = getPaneMedia(activePaneEl);
        ensureBgVideoPlaying(video);
      }
    }

    function clearAllLayers() {
      clearTextLayer({ wipe: true });
      clearMediaLayer();
      clearPropLayer();
      clearAnnounceLayer();
      setDesignCleared(true);
      setAudioMuted(true);
    }

    function setDesignCleared(cleared) {
      bodyEl.classList.toggle('design-cleared', Boolean(cleared));
    }

    function setAudioMuted(muted) {
      bodyEl.classList.toggle('audio-cleared', Boolean(muted));
      const vol = muted ? 0 : (appSettings.masterVolume ?? 100) / 100;
      panes.forEach((pane) => {
        const video = pane?.querySelector('.bg-video');
        if (video) video.volume = vol;
      });
      const logoVid = logoLayer?.querySelector('.logo-video');
      if (logoVid) logoVid.volume = vol;
    }

    function hexToRgba(hex, alpha) {
      const h = String(hex || '#000000').replace('#', '');
      const full = h.length === 3 ? h.split('').map((c) => c + c).join('') : h;
      const n = parseInt(full.slice(0, 6), 16);
      if (!Number.isFinite(n)) return `rgba(0,0,0,${alpha})`;
      const r = (n >> 16) & 255;
      const g = (n >> 8) & 255;
      const b = n & 255;
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function defaultPropBox(position) {
      if (position === 'top') return { boxX: 10, boxY: 8, boxW: 80, boxH: 18 };
      if (position === 'center') return { boxX: 15, boxY: 38, boxW: 70, boxH: 24 };
      return { boxX: 10, boxY: 72, boxW: 80, boxH: 18 };
    }

    function showPropLayer(data) {
      if (outputBlackoutActive) return;
      if (!propLayer || !propText) return;
      const position = ['top', 'center', 'bottom'].includes(data?.position) ? data.position : 'bottom';
      propLayer.dataset.position = position;
      propText.textContent = String(data?.text || '');
      const fs = Number(data?.fontSize) || 5;
      propText.style.fontSize = `clamp(${Math.round(fs * 5)}px, ${fs * 1.4}cqh, ${Math.round(fs * 10)}px)`;
      propText.style.color = data?.color || '#ffffff';
      propText.style.fontWeight = String(data?.fontWeight || 800);
      propText.style.textAlign = data?.textAlign || 'center';
      propText.style.padding = `${Number(data?.padding ?? 16)}px`;
      propText.style.borderRadius = `${Number(data?.borderRadius ?? 10)}px`;
      propText.style.background = hexToRgba(data?.bgColor || '#000000', Number(data?.bgOpacity ?? 0.55));
      const defaults = defaultPropBox(position);
      const hasBox = ['boxX', 'boxY', 'boxW', 'boxH'].some((k) => Number.isFinite(Number(data?.[k])));
      if (hasBox) {
        propLayer.style.display = 'block';
        propText.classList.add('is-boxed');
        propText.style.left = `${Number.isFinite(Number(data.boxX)) ? Number(data.boxX) : defaults.boxX}%`;
        propText.style.top = `${Number.isFinite(Number(data.boxY)) ? Number(data.boxY) : defaults.boxY}%`;
        propText.style.width = `${Number.isFinite(Number(data.boxW)) ? Number(data.boxW) : defaults.boxW}%`;
        propText.style.height = `${Number.isFinite(Number(data.boxH)) ? Number(data.boxH) : defaults.boxH}%`;
        propText.style.display = 'flex';
        propText.style.alignItems = 'center';
        propText.style.justifyContent = data?.textAlign === 'left' ? 'flex-start' : (data?.textAlign === 'right' ? 'flex-end' : 'center');
      } else {
        propLayer.style.display = '';
        propText.classList.remove('is-boxed');
        propText.style.left = '';
        propText.style.top = '';
        propText.style.width = '';
        propText.style.height = '';
      }
      propLayer.classList.add('is-visible');
    }

    function clearPropLayer() {
      if (!propLayer) return;
      propLayer.classList.remove('is-visible');
      if (propText) {
        propText.textContent = '';
        propText.style.fontSize = '';
        propText.style.color = '';
        propText.style.background = '';
        propText.classList.remove('is-boxed');
        propText.style.left = '';
        propText.style.top = '';
        propText.style.width = '';
        propText.style.height = '';
      }
    }

    function showAnnounceLayer(text) {
      if (outputBlackoutActive) return;
      if (!announceLayer || !announceText) return;
      announceText.textContent = String(text || '');
      announceLayer.classList.add('is-visible');
    }

    function clearAnnounceLayer() {
      if (!announceLayer) return;
      announceLayer.classList.remove('is-visible');
      if (announceText) announceText.textContent = '';
    }

    function resolveCurrentSlide() {
      if (!lastBaseSlide) return null;
      if (!lastContent) return SlideEngine.prepareSlideForBroadcast(lastBaseSlide);
      return SlideEngine.prepareSlideForBroadcast(
        SlideEngine.mergeContentIntoSlide(lastBaseSlide, lastContent),
      );
    }

    function renderCurrentSlide(opts = {}) {
      if (outputBlackoutActive) return;
      const slide = resolveCurrentSlide();
      if (!slide || !SlideEngine.hasSlideRenderableContent(slide)) {
        if (opts.force || lastBaseSlide) clearTextLayer({ wipe: true });
        return;
      }
      restoreTextLayerIfNeeded();
      crossfadeSlide(slide);
      activeSlideKey = slideFingerprint(slide);
      lastShownSlideKey = activeSlideKey;
      lastSlideState = { slide, text: SlideEngine.getPrimaryText(slide) };
    }

    function ingestSlidePayload(data) {
      if (data?.content && data?.baseSlide) {
        lastContent = data.content;
        lastBaseSlide = SlideEngine.normalizeSlide(JSON.parse(JSON.stringify(data.baseSlide)));
        return;
      }
      const raw = data?.baseSlide || data?.slide || null;
      if (!raw) {
        lastBaseSlide = null;
        lastContent = null;
        return;
      }
      const extracted = SlideEngine.extractSlideContent(raw);
      lastContent = extracted.payload;
      lastBaseSlide = extracted.baseSlide;
    }

    function showSlide(data) {
      ingestSlidePayload(data);
      const seq = data?.seq || 0;

      if (seq && seq < lastSlideSeq) {
        sendSlideAck(data, lastBaseSlide, { stale: true });
        return;
      }

      if (!lastBaseSlide || !lastContent) {
        if (seq) lastSlideSeq = seq;
        lastShownSlideKey = '';
        lastSlideState = null;
        if (!outputBlackoutActive) {
          bodyEl.classList.remove('is-blackout');
          clearTextLayer({ wipe: true });
        }
        sendSlideAck(data, null, { empty: true });
        return;
      }

      const slide = resolveCurrentSlide();
      const slideKey = slide ? slideFingerprint(slide) : '';

      if (!data?.layerRestore && seq && seq === lastSlideSeq && slideKey && slideKey === lastShownSlideKey) {
        sendSlideAck(data, slide, { duplicate: true });
        return;
      }

      if (seq) lastSlideSeq = seq;

      if (outputBlackoutActive) {
        sendSlideAck(data, slide, { queued: true });
        return;
      }

      if (data?.layerRestore) {
        bodyEl.classList.remove('is-blackout');
        renderCurrentSlide({ force: true });
        sendSlideAck(data, slide, { layerRestore: true });
        return;
      }

      bodyEl.classList.remove('is-blackout');
      renderCurrentSlide({ force: true });
      sendSlideAck(data, slide);
    }

    ipcRenderer.on('background:set', (_e, data) => {
      restoreMediaLayer();
      crossfadeBackground(data);
    });

    ipcRenderer.on('background:clear', () => {
      clearMediaLayer();
    });

    function acceptMacroSeq(seq) {
      if (seq && seq < lastMacroSeq) return false;
      if (seq) lastMacroSeq = seq;
      return true;
    }

    ipcRenderer.on('output:clear-text', (_e, data) => {
      if (!acceptMacroSeq(data?.seq || 0)) return;
      clearTextLayer();
    });
    ipcRenderer.on('output:clear-media', (_e, data) => {
      if (!acceptMacroSeq(data?.seq || 0)) return;
      clearMediaLayer();
    });
    ipcRenderer.on('output:restore-media', (_e, data) => {
      if (!acceptMacroSeq(data?.seq || 0)) return;
      restoreMediaLayer();
    });
    ipcRenderer.on('output:clear-all', (_e, data) => {
      if (!acceptMacroSeq(data?.seq || 0)) return;
      clearAllLayers();
    });
    ipcRenderer.on('output:clear-design', (_e, data) => {
      if (!acceptMacroSeq(data?.seq || 0)) return;
      setDesignCleared(true);
    });
    ipcRenderer.on('output:restore-design', (_e, data) => {
      if (!acceptMacroSeq(data?.seq || 0)) return;
      setDesignCleared(false);
      if (lastSlideState?.slide) crossfadeSlide(lastSlideState.slide);
    });
    ipcRenderer.on('output:clear-props', (_e, data) => {
      if (!acceptMacroSeq(data?.seq || 0)) return;
      clearPropLayer();
    });
    ipcRenderer.on('output:clear-audio', (_e, data) => {
      if (!acceptMacroSeq(data?.seq || 0)) return;
      setAudioMuted(true);
    });
    ipcRenderer.on('output:clear-announcements', (_e, data) => {
      if (!acceptMacroSeq(data?.seq || 0)) return;
      clearAnnounceLayer();
    });
    ipcRenderer.on('output:prop-show', (_e, data) => {
      showPropLayer(data);
    });
    ipcRenderer.on('output:prop-clear', () => clearPropLayer());
    ipcRenderer.on('output:announce-show', (_e, data) => {
      showAnnounceLayer(data?.text);
    });
    ipcRenderer.on('output:announce-clear', () => clearAnnounceLayer());
    ipcRenderer.on('output:audio-restore', () => setAudioMuted(false));

    ipcRenderer.on('subtitle:slide', (_e, data) => showSlide(data));

    ipcRenderer.on('output:logo', (_e, data) => {
      if (outputBlackoutActive) return;
      if (!logoLayer) return;
      const logoVid = logoLayer.querySelector('.logo-video');
      const show = Boolean(data?.visible) && data?.media?.src;
      if (!show) {
        logoLayer.classList.remove('is-visible');
        if (logoImg) logoImg.removeAttribute('src');
        if (logoVid) { logoVid.pause(); logoVid.removeAttribute('src'); logoVid.load(); }
        return;
      }
      if (data.media.type === 'video' && logoVid) {
        if (logoImg) logoImg.removeAttribute('src');
        if (logoVid.src !== data.media.src) { logoVid.src = data.media.src; logoVid.load(); }
        logoVid.loop = appSettings.loopBackgroundVideo !== false;
        logoVid.volume = (appSettings.masterVolume ?? 100) / 100;
        logoVid.play().catch(() => {});
        logoVid.style.display = 'block';
        if (logoImg) logoImg.style.display = 'none';
      } else if (logoImg) {
        if (logoVid) { logoVid.pause(); logoVid.removeAttribute('src'); logoVid.style.display = 'none'; }
        if (logoImg.src !== data.media.src) logoImg.src = data.media.src;
        logoImg.style.display = 'block';
      }
      logoLayer.classList.add('is-visible');
    });

    ipcRenderer.on('subtitle:update', (_e, data) => {
      if (outputBlackoutActive) return;
      const text = typeof data === 'string' ? data : (data?.text ?? '');
      if (!text.trim()) {
        clearTextLayer();
        return;
      }
      showSlide({
        slide: SlideEngine.createSlideFromText(text),
        text,
        seq: data?.seq,
      });
    });

    ipcRenderer.on('subtitle:blackout', (_e, data) => {
      const seq = data?.seq;
      if (seq && seq < lastSlideSeq) return;
      if (seq) lastSlideSeq = seq;
      outputBlackoutActive = true;
      bodyEl.classList.add('is-blackout');
      applyMasterVolume();
      clearTextLayer();
    });

    ipcRenderer.on('subtitle:unblackout', (_e, data) => {
      const seq = data?.seq;
      if (seq && seq < lastSlideSeq) return;
      if (seq) lastSlideSeq = seq;
      outputBlackoutActive = false;
      bodyEl.classList.remove('is-blackout');
      applyMasterVolume();
      renderCurrentSlide({ force: true });
    });

    ipcRenderer.on('subtitle:clear', (_e, data) => {
      const seq = data?.seq;
      if (seq && seq < lastSlideSeq) return;
      if (seq) lastSlideSeq = seq;
      if (!outputBlackoutActive) bodyEl.classList.remove('is-blackout');
      clearTextLayer({ wipe: true });
      lastSlideState = null;
    });

    if (displayRole === 'relay') {
      document.addEventListener('contextmenu', (e) => e.preventDefault());
    }
  </script>
</body>
</html>
