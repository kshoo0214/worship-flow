<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Themes</title>
  <style>
    :root {
      --bg: #0d0d11; --surface: #16161b; --surface-2: #1e1e24; --surface-3: #282830;
      --border: rgba(255,255,255,0.08); --text: #ececf1; --muted: #9494a0;
      --accent: #4d8ef7; --accent-dim: rgba(77,142,247,0.16); --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background: var(--bg); color: var(--text); font-size: 13px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    header h1 { margin: 0; font-size: 14px; font-weight: 600; }
    header .hint { font-size: 11px; color: var(--muted); max-width: 480px; text-align: right; line-height: 1.4; }
    button {
      border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    button.primary { background: var(--accent); color: #fff; }
    button.secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    button.danger { background: transparent; color: #fca5a5; border: 1px solid var(--border); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .layout { flex: 1; display: grid; grid-template-columns: 200px 1fr 300px; min-height: 0; }
    .theme-list-panel {
      border-right: 1px solid var(--border); background: var(--surface);
      display: flex; flex-direction: column; min-height: 0;
    }
    .list-toolbar { padding: 8px; display: flex; gap: 6px; flex-shrink: 0; }
    .list-toolbar button { flex: 1; padding: 8px; font-size: 11px; }
    #themeList { flex: 1; overflow-y: auto; padding: 6px 8px 12px; }
    .theme-item {
      padding: 9px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 4px;
      border: 1px solid transparent; font-size: 12px;
    }
    .theme-item:hover { background: var(--surface-2); }
    .theme-item.active { background: var(--accent-dim); border-color: rgba(77,142,247,0.4); }
    .theme-item .sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .editor-main { display: flex; flex-direction: column; min-height: 0; background: var(--bg); }
    .editor-toolbar {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      border-bottom: 1px solid var(--border); background: var(--surface-2); flex-shrink: 0;
    }
    .editor-toolbar label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    .editor-toolbar input[type="text"] {
      flex: 1; max-width: 280px; padding: 8px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px;
    }
    .canvas-viewport {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 16px; min-height: 0; overflow: auto;
    }
    .edit-canvas-wrap {
      width: min(100%, 920px); aspect-ratio: 16/9;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55); border: 1px solid #333;
    }
    #editCanvas {
      width: 100%; height: 100%; position: relative; container-type: size; background: #000;
    }
    .inspector {
      background: var(--surface-2); border-left: 1px solid var(--border);
      overflow-y: auto; padding: 10px 12px; min-height: 0;
    }
    .inspector-section { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .inspector-section:last-child { border-bottom: none; }
    .inspector-section h3 {
      margin: 0 0 8px; font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .inspector-row { margin-bottom: 8px; }
    .inspector-row label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .inspector-row input, .inspector-row select {
      width: 100%; padding: 7px 9px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 12px;
    }
    .inspector-row input[type="color"] { height: 32px; padding: 2px; }
    .inspector-row.inline-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; }
    .inspector-row.inline-4 input { padding: 6px; font-size: 11px; }
    .align-btns { display: flex; gap: 4px; }
    .align-btns button { flex: 1; padding: 6px; font-size: 11px; background: var(--surface-3); color: var(--text); border: 1px solid var(--border); border-radius: 6px; }
    .align-btns button.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .empty-hint {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 12px; padding: 24px; text-align: center; line-height: 1.6;
    }
    footer {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; background: var(--surface);
    }
  </style>
</head>
<body>
  <header>
    <h1 id="pageTitle">마스터 테마 관리</h1>
    <span class="hint" id="pageHint"></span>
  </header>
  <div class="layout">
    <aside class="theme-list-panel">
      <div class="list-toolbar">
        <button type="button" id="btnNew" class="primary">새 테마</button>
        <button type="button" id="btnDelete" class="danger" disabled>삭제</button>
      </div>
      <div id="themeList"></div>
    </aside>
    <section class="editor-main" id="editorMain">
      <div class="empty-hint" id="emptyHint">테마를 선택하거나 새로 만드세요.</div>
      <div id="editorWorkspace" hidden>
        <div class="editor-toolbar">
          <label id="lblName" for="fName">이름</label>
          <input type="text" id="fName" autocomplete="off">
        </div>
        <div class="canvas-viewport">
          <div class="edit-canvas-wrap">
            <div id="editCanvas"></div>
          </div>
        </div>
      </div>
    </section>
    <aside class="inspector" id="inspectorPanel"></aside>
  </div>
  <footer>
    <button type="button" id="btnClose" class="secondary">닫기</button>
    <button type="button" id="btnSave" class="primary" disabled>저장</button>
  </footer>
  <script>
    const { ipcRenderer } = require('electron');
    const SE = require('./slide-engine');
    const I18N = require('./i18n');
    const TI = require('./theme-inspector');

    const PREVIEW_TEXT = { ko: '가사 미리보기\nSubtitle preview', en: 'Lyrics preview\nSubtitle preview' };

    let catalog = [];
    let editingId = null;
    let dirty = false;
    let draftSlide = null;
    let textLayer = null;

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function applyChromeI18n() {
      document.getElementById('pageTitle').textContent = I18N.t('themeManagerTitle');
      document.getElementById('pageHint').textContent = I18N.t('themePreviewHint');
      document.getElementById('btnNew').textContent = I18N.t('themeNew');
      document.getElementById('btnDelete').textContent = I18N.t('themeDelete');
      document.getElementById('btnSave').textContent = I18N.t('themeSaveBtn');
      document.getElementById('btnClose').textContent = I18N.t('settingsClose');
      document.getElementById('lblName').textContent = I18N.t('themeNameLabel');
      document.getElementById('emptyHint').textContent = I18N.t('themeManagerEmpty');
    }

    function createDraftSlide(textLayerTpl) {
      const lang = I18N.getLanguage();
      const text = PREVIEW_TEXT[lang] || PREVIEW_TEXT.ko;
      const tpl = SE.normalizeThemeTextLayer(textLayerTpl);
      const layer = SE.createTextLayer(text, {
        x: tpl.x, y: tpl.y, w: tpl.w, h: tpl.h, style: { ...tpl.style },
      });
      return SE.normalizeSlide({
        background: { type: 'color', color: '#000000' },
        layers: [layer],
      });
    }

    function renderCanvas() {
      if (!draftSlide || !textLayer) return;
      SE.renderSlide(draftSlide, document.getElementById('editCanvas'), {
        clear: true,
        scale: 1,
        fontUnit: 'cqh',
        textMode: 'primary',
      });
    }

    function renderInspectorPanel() {
      const panel = document.getElementById('inspectorPanel');
      if (!textLayer) {
        panel.innerHTML = '';
        return;
      }
      panel.innerHTML = TI.buildTextLayerInspectorHTML((k) => I18N.t(k));
      TI.bindTextLayerInspector(textLayer, {
        onChange: () => {
          dirty = true;
          document.getElementById('btnSave').disabled = false;
          renderCanvas();
        },
        clampFn: clamp,
      });
    }

    function setEditorVisible(on) {
      document.getElementById('emptyHint').hidden = on;
      document.getElementById('editorWorkspace').hidden = !on;
      document.getElementById('btnSave').disabled = !on || !dirty;
      document.getElementById('btnDelete').disabled = !editingId || String(editingId).startsWith('draft_');
      if (on) {
        renderInspectorPanel();
        requestAnimationFrame(renderCanvas);
      } else {
        document.getElementById('inspectorPanel').innerHTML = '';
      }
    }

    function loadDraftFromTheme(theme) {
      const tpl = theme?.textLayer || SE.defaultThemeTextLayer();
      draftSlide = createDraftSlide(tpl);
      if (theme?.background !== undefined) {
        draftSlide.background = SE.normalizeBackground(theme.background);
      }
      textLayer = SE.getPrimaryTextLayer(draftSlide);
    }

    function readPayload() {
      const snap = draftSlide
        ? SE.extractThemeFromSlide(draftSlide)
        : { textLayer: SE.extractThemeFromTextLayer(textLayer) };
      return {
        id: editingId && !String(editingId).startsWith('draft_') ? editingId : undefined,
        name: String(document.getElementById('fName').value || '').trim(),
        textLayer: snap.textLayer,
        background: snap.background,
      };
    }

    function renderList() {
      const list = document.getElementById('themeList');
      if (!catalog.length) {
        list.innerHTML = `<div class="empty-hint" style="padding:16px">${I18N.t('themeManagerNoThemes')}</div>`;
        return;
      }
      list.innerHTML = '';
      catalog.forEach((t) => {
        const row = document.createElement('div');
        row.className = 'theme-item' + (t.id === editingId ? ' active' : '');
        row.innerHTML = `<div>${escapeHtml(t.name)}</div><div class="sub">${formatDate(t.updatedAt)}</div>`;
        row.onclick = () => selectTheme(t.id);
        list.appendChild(row);
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatDate(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleString(I18N.getLanguage() === 'en' ? 'en-US' : 'ko-KR', { dateStyle: 'short', timeStyle: 'short' });
      } catch { return ''; }
    }

    function selectTheme(id) {
      const t = catalog.find((x) => x.id === id);
      if (!t) return;
      editingId = t.id;
      dirty = false;
      document.getElementById('fName').value = t.name;
      loadDraftFromTheme(t);
      setEditorVisible(true);
      document.getElementById('btnSave').disabled = true;
      renderList();
    }

    function newTheme() {
      editingId = `draft_${Date.now()}`;
      dirty = true;
      document.getElementById('fName').value = I18N.t('themeNewDefaultName');
      loadDraftFromTheme(null);
      setEditorVisible(true);
      document.getElementById('btnSave').disabled = false;
      renderList();
    }

    function saveTheme() {
      const payload = readPayload();
      if (!payload.name) {
        alert(I18N.t('themeNamePrompt'));
        return;
      }
      ipcRenderer.send('theme:save', payload);
      dirty = false;
      document.getElementById('btnSave').disabled = true;
    }

    function deleteTheme() {
      if (!editingId || String(editingId).startsWith('draft_')) return;
      if (!confirm(I18N.t('themeDeleteConfirm'))) return;
      ipcRenderer.send('theme:delete', { id: editingId });
      editingId = null;
      draftSlide = null;
      textLayer = null;
      dirty = false;
      setEditorVisible(false);
    }

    document.getElementById('fName').addEventListener('input', () => {
      dirty = true;
      document.getElementById('btnSave').disabled = false;
    });

    document.getElementById('btnNew').onclick = newTheme;
    document.getElementById('btnDelete').onclick = deleteTheme;
    document.getElementById('btnSave').onclick = saveTheme;
    document.getElementById('btnClose').onclick = () => window.close();

    ipcRenderer.on('themes:sync', (_e, themes) => {
      catalog = Array.isArray(themes) ? themes : [];
      if (editingId && !String(editingId).startsWith('draft_')) {
        const still = catalog.find((t) => t.id === editingId);
        if (still) {
          document.getElementById('fName').value = still.name;
          if (!dirty) {
            loadDraftFromTheme(still);
            renderInspectorPanel();
            renderCanvas();
          }
        }
      } else if (editingId && String(editingId).startsWith('draft_')) {
        const byName = catalog.find((t) => t.name === document.getElementById('fName').value.trim());
        if (byName) {
          editingId = byName.id;
          dirty = false;
          document.getElementById('btnSave').disabled = true;
        }
      }
      renderList();
    });

    ipcRenderer.once('settings:sync', (_e, s) => {
      I18N.setLanguage(s?.language || 'ko');
      applyChromeI18n();
    });

    ipcRenderer.send('settings:get');
    ipcRenderer.send('request-themes');
    applyChromeI18n();
    window.addEventListener('resize', () => requestAnimationFrame(renderCanvas));
  </script>
</body>
</html>
