name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (Mac + Windows)
        run: npm run publish:all
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show version
        run: node -p "require('./package.json').version"
